function update(){
  S.t++;
  if(soapDirty){ applyMask(sc); soapDirty=false; }
  if(dropDirty){ applyMask(pc); dropDirty=false; }
  const kind=CARS[S.carType].kind;
  const maxSp=currentMaxSpeed();
  if(S.scene==="mdrive"||(S.scene==="mwash"&&manualPhase===6)||S.scene==="auto"){
    let target=S.pedal?maxSp:0;
    // conveyor: inside the tunnel the track gently pulls the car
    if(S.scene==="auto"){
      const inTunnel=car.x+car.w/2>stations[0].x-car.w*0.5 && car.x<exitX;
      if(S.autoExit){
        // After the dryer, the conveyor owns the final rollout so a young player
        // cannot get stuck by releasing GAS at the exact moment the wash ends.
        target=Math.max(target,maxSp*.58);
        S.brake=false;
      } else if(inTunnel&&!S.brake) target=Math.max(target,maxSp*0.34);
    }
    if(S.brake) target=Math.min(target,maxSp*0.06);   // brake fights the conveyor, never fully stops it
    S.speed+=(target-S.speed)*(S.brake?0.16:0.06);
    if(S.speed>maxSp*0.3&&S.scene!=="auto") hideMsg();
    if(S.speed<0.02&&!S.pedal&&S.scene!=="auto") S.speed=0;
    car.x+=S.speed;
    car.spin+=S.speed/ (car.w*0.085);
    car.bounce=S.speed>0.3?(kind==="monster"?4.6:2.2):0.6;
    setEngine(S.speed>0.15||S.pedal,S.speed);
    if(S.scene==="auto") updateSpeedZone();
  } else {
    car.bounce=0;
    setEngine(false,0);
  }

  if(S.scene==="mdrive"){
    if(car.x>=bayX){
      car.x=bayX; S.speed=0; S.pedal=false;
      brakeSqueak();
      S.scene="mwash";
      showPedal(false);
      setManualPhase(0);
    }
  }
  else if(S.scene==="mwash"&&manualPhase===6){
    if(car.x-camX>W+car.w*0.2) finishRun();
  }
  else if(S.scene==="auto"){
    camX=Math.max(0,Math.min(car.x-W*0.36,worldLen-W));
    autoStations();
    const finalStation=stations[stations.length-1];
    if(S.autoExit&&finalStation&&car.x>finalStation.x+car.w*.95) finishRun();
    else if(car.x-camX>W+car.w*0.2||car.x>worldLen-car.w*0.5) finishRun();
  }
}

/* Apply one station's physical effect to the sections it actually reaches.
   This is where the dependency chain lives:
     soak   softens dirt so later brushes bite
     foam   lays soap, which multiplies brush effectiveness
     wheels only touches tires, rims and the lowest panels
     mitter/brush remove LOOSENED dirt — dry, unsoaped dirt barely moves
     rinse  strips soap and carries off loose dirt, leaves the car wet
     wax    only bonds to a clean, rinsed surface — otherwise it streaks
     dryer  removes water only; it cannot clean anything                */
function applyStation(key,dt){
  const reach=REACH[key]; if(!reach) return;
  const size=SIZE_FACTOR[CARS[S.carType].kind]||1;
  const base=(AUTO_RATES[key]||.010)*dt/size;

  for(let s=0;s<7;s++){
    const r=reach[s]; if(r<=0) continue;
    const k=secs[s], a=base*r;
    // Dry, unfoamed grime is BAKED ON. Brushes cannot lift what water and soap
    // have not loosened first — no matter how long you sit there. This is the
    // floor that makes pre-soak and foam genuinely matter.
    // Peak prep, not current: once a panel HAS been foamed, the grime stays
    // liftable even after the rinse washes the suds away.
    k.peakSoap=Math.max(k.peakSoap||0,k.soap);
    // Both are required. Water without soap just makes mud. Soap without a
    // pre-soak sits on top of dry grit. You need both, so skipping either
    // station leaves grime the brushes physically cannot lift.
    const removable=(0.22+0.78*k.soft)*(0.22+0.78*k.peakSoap)*(1-0.35*k.grit*(1-k.peakSoap));
    const floor=clamp01(1-removable);
    // never increases dirt; never removes below the floor
    const strip=(amt)=>{
      const lower=Math.min(k.dirt,floor);
      k.dirt=clamp01(Math.max(k.dirt-amt,lower));
    };

    if(key==="soak"){
      k.soft=clamp01(k.soft+a*1.4);
      k.dirt=clamp01(k.dirt-a*0.06);      // rinses off loose dust only
      k.water=clamp01(k.water+a*1.6);
    }
    else if(key==="foam"){
      k.soap=clamp01(k.soap+a*1.8);
      k.soft=clamp01(k.soft+a*0.22);
      k.dirt=clamp01(k.dirt-a*0.04);
    }
    else if(key==="wheels"){
      // high-pressure jets — these blast grime off regardless of prep
      k.dirt=clamp01(k.dirt-a*1.8);
      k.water=clamp01(k.water+a*1.2);
      k.soft=clamp01(k.soft+a*0.5);
    }
    else if(key==="mitter"){
      const eff=(0.30+0.70*k.soft)*(0.60+0.40*k.soap)*(1-0.30*k.grit);
      strip(a*1.5*eff);
      k.soap=clamp01(k.soap-a*0.20);
    }
    else if(key==="brush"){
      const eff=(0.28+0.72*k.soft)*(0.42+0.58*k.soap)*(1-0.35*k.grit);
      strip(a*2.1*eff);
      k.soap=clamp01(k.soap-a*0.25);
    }
    else if(key==="rinse"){
      k.soap=clamp01(k.soap-a*2.2);
      strip(a*0.15*(0.35+0.65*k.soft));
      k.water=clamp01(k.water+a*1.8);
    }
    else if(key==="wax"){
      // wax quality is decided by the surface it lands on, right now
      const quality=clamp01((1-k.dirt)*(1-k.soap));
      const dw=a*1.5, prev=k.wax;
      k.wax=clamp01(k.wax+dw);
      const added=k.wax-prev;
      if(added>0) k.waxQ=(k.waxQ*prev+quality*added)/(prev+added);
    }
    else if(key==="dry"){
      k.water=clamp01(k.water-a*2.2);   // water only. dirt and soap stay put.
    }
  }
}

function autoStations(){
  const cx=car.x+car.w/2, cy=car.y+car.h*0.45;
  const maxSp=Math.max(.001,currentMaxSpeed());
  const speedRatio=clamp01(S.speed/maxSp);
  let soundWanted=null;
  let activeIdx=0;
  let activeStation=null;

  stations.forEach((st,i)=>{
    const near=stationActive(st);
    if(cx>st.x+car.w*0.62&&!st.passed){
      st.passed=true;
      st.rated=true;
      rateAutoStripStation(i,st.progress);
      if(st.progress>=.88) cheer();
      else if(st.progress<.55) blip(210,.18,"sawtooth",.08);
    }
    if(st.passed) activeIdx=Math.max(activeIdx,i+2);
    else if(near) activeIdx=Math.max(activeIdx,i+1);
    if(!near) return;

    activeStation=st;
    // dwell time is what does the work — a slow pass cleans, a fast pass doesn't
    const dwell=Math.max(.28,1.10-speedRatio*.80)*frameScale;
    st.progress=clamp01(st.progress+(AUTO_RATES[st.key]||.010)*dwell*0.75);
    applyStation(st.key,dwell);
    const sxScreen=st.x-camX;

    if(st.key==="soak"){
      soundWanted="spray";
      if(S.t%2===0) for(let i2=0;i2<5;i2++) spawnJet(st.x-car.w*0.28+i2*car.w*0.14,H*0.26,true);
    } else if(st.key==="foam"){
      soundWanted="foam";
      if(S.t%3===0){
        spawnFoamBlast(st.x-car.w*0.31,H*0.24,cx,cy,true,"rgba(255,182,213,.9)");
        spawnFoamBlast(st.x+car.w*0.31,H*0.24,cx,cy,true,"rgba(178,222,255,.9)");
      }
    } else if(st.key==="mitter"){
      soundWanted="brush";
      car.bounce=3.2;
      if(S.t%6===0) spawnBubbles(sxScreen+(Math.random()-0.5)*car.w*0.5,car.y+Math.random()*car.h*0.6,false,1);
    } else if(st.key==="brush"){
      soundWanted="brush";
      car.bounce=3.6;
      if(S.t%5===0) spawnBubbles(sxScreen+(Math.random()-0.5)*car.w*0.6,car.y+Math.random()*car.h,false,1);
    } else if(st.key==="wheels"){
      soundWanted="spray";
      if(S.t%2===0){
        for(let k=-1;k<=1;k+=2){
          P({k:"water",x:st.x+k*car.w*0.2+(Math.random()-0.5)*14,y:roadTop()-8,world:true,
            r:2.5+Math.random()*3,vx:(Math.random()-0.5)*1.6,vy:-(4.5+Math.random()*3),life:1});
        }
      }
      if(S.t%7===0){
        spawnSparkles(car.x-camX+car.w*0.24,car.y+car.h*0.85,false,1);
        spawnSparkles(car.x-camX+car.w*0.76,car.y+car.h*0.85,false,1);
      }
    } else if(st.key==="wax"){
      soundWanted="foam";
      if(S.t%3===0){
        const wc=["rgba(239,71,111,.85)","rgba(255,209,102,.85)","rgba(6,214,160,.85)",
                  "rgba(76,201,240,.85)","rgba(155,93,229,.85)"];
        P({k:"foam",x:st.x+(Math.random()-0.5)*car.w*0.5,y:H*0.28+Math.random()*H*0.25,world:true,
          r:5+Math.random()*8,col:wc[(Math.random()*5)|0],
          vx:(Math.random()-0.5)*1,vy:0.6+Math.random(),life:1});
      }
      if(S.t%6===0) spawnSparkles(car.x-camX+Math.random()*car.w,car.y+Math.random()*car.h*0.7,false,1);
    } else if(st.key==="rinse"){
      soundWanted="spray";
      if(S.t%2===0) for(let i2=0;i2<5;i2++) spawnJet(st.x-car.w*0.28+i2*car.w*0.14,H*0.26,true);
    } else if(st.key==="dry"){
      soundWanted="dryer";
      if(S.t%3===0) spawnWind(sxScreen-car.w*0.3+Math.random()*car.w*0.6,car.y+Math.random()*car.h*0.8,false);
      if(S.t%9===0) spawnSparkles(sxScreen+(Math.random()-0.5)*car.w*0.4,car.y+Math.random()*car.h*0.6,false,1);
    }
  });

  syncAutoVisuals();
  updateCleanBadge();
  if(activeStation){
    setAutoStationProgress(activeStation);
  } else if(!S.autoExit){
    const pct=Math.round(scoreOverall()*100);
    $("#progFill").style.width=pct+"%";
    $("#progTxt").textContent="CLEAN "+pct+"%";
  }

  const allPassed=stations.length>0&&stations.every(st=>st.passed);
  if(allPassed&&!S.autoExit&&!S.celebrating){
    S.autoExit=true;
    S.pedal=false; S.brake=false;
    activeIdx=stations.length+1;
    finalCleanPct=Math.round(scoreOverall()*100);
    $("#progFill").style.width=finalCleanPct+"%";
    $("#progTxt").textContent="FINAL "+finalCleanPct+"%";
    msg("✅",finalCleanPct+"% clean — rolling out!");
    dingDing();
  }
  if(car.x>exitX) activeIdx=stations.length+1;
  stripProgress(activeIdx);
  stations.forEach((st,i)=>{ if(st.rated) rateAutoStripStation(i,st.progress); });
  setMachine(soundWanted);
}


/* ============================================================
   RENDER
   ============================================================ */
function render(){
  g.clearRect(0,0,W,H);
  drawSky();
  if(S.scene==="auto"){ drawTunnel(); drawStationsBack(); }
  if(S.scene==="mdrive"||S.scene==="mwash") drawManualBay();
  if(S.scene!=="menu") drawCarFull();
  if(S.scene==="auto") drawStationsFront();
  drawParticles();
  // ambient
  if(S.scene==="mwash"&&manualPhase===1&&Math.random()<0.04)
    spawnBubbles(car.x-camX+Math.random()*car.w,car.y+car.h*0.2,false,1);
  if(S.scene==="mwash"&&manualPhase>=4&&manualPhase<=5&&Math.random()<0.08)
    spawnSparkles(car.x-camX+Math.random()*car.w,car.y+Math.random()*car.h,false,1);
}

function loop(now=performance.now()){
  frameScale=Math.max(.35,Math.min(2.2,(now-lastFrameClock)/16.667));
  lastFrameClock=now;
  if(S.scene!=="menu"){ update(); }
  render();
  requestAnimationFrame(loop);
}
resize();
buildManualWorld(false);
loop();
</script>
</body>
</html>
