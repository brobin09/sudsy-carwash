<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Sudsy's Car Wash</title>
<meta name="theme-color" content="#7ec8e3">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" href="icon-192.png">
<script>
  window.addEventListener('error', function (e) {
    var d = document.getElementById('errBanner');
    if (!d) {
      d = document.createElement('div');
      d.id = 'errBanner';
      d.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:99999;background:#c9184a;color:#fff;'
        + 'font:bold 13px monospace;padding:8px 12px;white-space:pre-wrap;';
      (document.body || document.documentElement).appendChild(d);
    }
    d.textContent = 'Error: ' + e.message + '\n' + (e.filename||'') + ':' + (e.lineno||'');
  });
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => navigator.serviceWorker.register('sw.js?v=3',{updateViaCache:'none'}).catch(()=>{}));
  }
</script>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html, body {
    width:100%; height:100%; overflow:hidden; position:fixed;
    touch-action:none; -webkit-user-select:none; user-select:none;
    font-family:"Arial Rounded MT Bold","Comic Sans MS","Chalkboard SE",sans-serif;
    background:#7ec8e3;
  }
  #main { position:absolute; inset:0; width:100%; height:100%; }

  /* ---------- Phase / station strip ---------- */
  #phaseStrip {
    position:absolute; top:calc(8px + env(safe-area-inset-top)); left:50%; transform:translateX(-50%);
    display:flex; gap:8px; z-index:30; pointer-events:none;
  }
  #phaseStrip::before {
    content:""; position:absolute; left:22px; right:22px; top:19px; height:6px;
    background:rgba(255,255,255,.65); border-radius:4px; z-index:0;
  }
  .phaseItem { display:flex; flex-direction:column; align-items:center; gap:2px; position:relative; z-index:1; }
  .phaseLbl {
    font-size:10px; font-weight:bold; color:#fff; letter-spacing:.5px;
    text-shadow:0 2px 3px rgba(0,0,0,.45);
  }
  .phaseIcon {
    position:relative; width:44px; height:44px; border-radius:50%;
    background:rgba(255,255,255,.55); border:3px solid rgba(255,255,255,.8);
    display:flex; align-items:center; justify-content:center;
    font-size:22px; opacity:.45; transition:all .35s;
  }
  @media (max-width:860px){
    .phaseLbl { display:none; }
    .phaseIcon { width:36px; height:36px; font-size:18px; }
    #phaseStrip { gap:6px; }
    #phaseStrip::before { top:15px; }
  }
  .phaseIcon.active {
    opacity:1; transform:scale(1.22);
    background:#fff; border-color:#ffb703;
    box-shadow:0 0 0 6px rgba(255,183,3,.35), 0 6px 14px rgba(0,0,0,.15);
    animation:pulse 1.2s infinite;
  }
  .phaseIcon.done { opacity:1; background:#b7efc5; border-color:#38b000; }
  .phaseIcon.done.partial { background:#fff1b8; border-color:#ffb703; }
  .phaseIcon.done.weak { background:#ffd6cf; border-color:#e85d4a; }
  @keyframes pulse { 0%,100%{transform:scale(1.22)} 50%{transform:scale(1.32)} }

  #stars {
    position:absolute; top:calc(10px + env(safe-area-inset-top)); right:14px; z-index:30;
    background:linear-gradient(#ffffff,#e8f4fd); border-radius:22px; padding:8px 18px;
    font-size:24px; font-weight:bold; color:#1d3557; pointer-events:none;
    border:4px solid #4361ee; box-shadow:0 6px 14px rgba(0,0,0,.2);
  }
  #cleanBadge {
    position:absolute; top:calc(70px + env(safe-area-inset-top)); right:14px; z-index:31;
    min-width:132px; min-height:58px; padding:7px 13px; border-radius:20px;
    display:none; align-items:center; justify-content:center; gap:9px;
    background:linear-gradient(180deg,#ffffff,#dff5ff);
    border:4px solid #22a6d5; box-shadow:0 7px 16px rgba(0,0,0,.2);
    color:#12324a; pointer-events:none; transform-origin:center;
  }
  #cleanBadge .drop { font-size:27px; line-height:1; }
  #cleanBadge .cleanCopy { display:flex; flex-direction:column; align-items:flex-start; line-height:1; }
  #cleanBadge small { font-size:11px; letter-spacing:1.4px; font-weight:900; opacity:.72; }
  #cleanBadge strong { font-size:25px; margin-top:4px; }
  #cleanBadge.rushing {
    border-color:#ff9f1c; background:linear-gradient(180deg,#fff7dc,#ffe2a8);
    animation:rushPulse .55s ease-in-out infinite alternate;
  }
  #cleanBadge.rushing small { color:#a33a00; opacity:1; }
  @keyframes rushPulse { from{transform:scale(1)} to{transform:scale(1.06)} }
  @media (max-width:760px){
    #cleanBadge { top:calc(58px + env(safe-area-inset-top)); min-width:108px; min-height:50px; padding:5px 9px; }
    #cleanBadge .drop { font-size:22px; }
    #cleanBadge strong { font-size:21px; }
    #cleanBadge small { font-size:9px; }
  }
  @media (max-width:520px){
    #cleanBadge { top:calc(102px + env(safe-area-inset-top)); right:10px; }
  }
  #progTxt {
    position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    font-size:12px; font-weight:bold; color:#fff; text-shadow:0 1px 2px rgba(0,0,0,.55);
  }
  #homeBtn {
    position:absolute; top:calc(10px + env(safe-area-inset-top)); left:14px; z-index:35;
    width:52px; height:52px; border-radius:50%; border:3px solid #fff;
    background:rgba(255,255,255,.7); font-size:26px; cursor:pointer;
    display:none; align-items:center; justify-content:center;
    font-family:inherit; touch-action:manipulation;
  }

  #progWrap {
    position:absolute; top:calc(74px + env(safe-area-inset-top)); left:50%; transform:translateX(-50%);
    width:min(360px,56vw); height:18px; background:rgba(255,255,255,.5);
    border-radius:12px; z-index:30; overflow:hidden; border:3px solid #fff;
    pointer-events:none; opacity:0; transition:opacity .4s;
  }
  #progWrap.show { opacity:1; }
  #progFill {
    height:100%; width:0%; border-radius:9px;
    background:linear-gradient(90deg,#ffd166,#ef476f,#06d6a0,#118ab2);
    background-size:300% 100%; animation:rainbow 3s linear infinite;
    transition:width .3s;
  }
  @keyframes rainbow { 0%{background-position:0% 0} 100%{background-position:300% 0} }

  #bubbleMsg {
    position:absolute; bottom:calc(26px + env(safe-area-inset-bottom)); left:50%; transform:translateX(-50%);
    background:#fff; border-radius:22px; padding:8px 18px;
    font-size:clamp(14px,2.3vw,20px); font-weight:bold; color:#334;
    box-shadow:0 6px 16px rgba(0,0,0,.18); z-index:30; pointer-events:none;
    display:flex; align-items:center; gap:8px; white-space:nowrap;
    transition:opacity .3s; opacity:0;
  }
  #bubbleMsg .emo { font-size:1.4em; }

  #hintHand {
    position:absolute; font-size:60px; z-index:40; pointer-events:none;
    filter:drop-shadow(0 4px 6px rgba(0,0,0,.3));
    opacity:0; transition:opacity .4s;
    animation:rub 1.1s ease-in-out infinite;
  }
  #hintHand.show { opacity:1; }
  @keyframes rub {
    0%,100% { transform:translate(0,0) rotate(-10deg); }
    50%     { transform:translate(60px,-18px) rotate(10deg); }
  }

  /* ---------- Pedals & horn ---------- */
  .pedal {
    position:absolute; z-index:32; display:none;
    border-radius:26px; border:5px solid rgba(255,255,255,.92);
    cursor:pointer; touch-action:none;
    align-items:center; justify-content:flex-end; flex-direction:column;
    padding-bottom:12px;
    transition:transform .08s, box-shadow .08s;
    background-image:radial-gradient(rgba(0,0,0,.30) 4.5px, transparent 5.5px);
    background-size:27px 27px; background-position:13px 14px;
  }
  .pedal .lbl {
    font-size:19px; font-weight:bold; color:#fff;
    text-shadow:0 2px 3px rgba(0,0,0,.45); letter-spacing:1.5px;
  }
  #gas {
    right:20px; bottom:calc(20px + env(safe-area-inset-bottom));
    width:112px; height:152px; background-color:#22c55e;
    box-shadow:0 10px 0 #15803d, 0 16px 26px rgba(0,0,0,.35), inset 0 4px 10px rgba(255,255,255,.35);
  }
  #gas.pressed { transform:translateY(8px); box-shadow:0 2px 0 #15803d, 0 6px 12px rgba(0,0,0,.3), inset 0 4px 10px rgba(255,255,255,.35); }
  #brake {
    left:20px; bottom:calc(20px + env(safe-area-inset-bottom));
    width:98px; height:128px; background-color:#9ca3af;
    box-shadow:0 10px 0 #4b5563, 0 16px 26px rgba(0,0,0,.35), inset 0 4px 10px rgba(255,255,255,.35);
  }
  #brake.pressed { transform:translateY(8px); box-shadow:0 2px 0 #4b5563, 0 6px 12px rgba(0,0,0,.3), inset 0 4px 10px rgba(255,255,255,.35); }

  #horn {
    position:absolute; right:152px; bottom:calc(30px + env(safe-area-inset-bottom));
    width:94px; height:94px; border-radius:50%; z-index:32;
    background:radial-gradient(circle at 35% 30%, #93c5fd, #2563eb 65%, #1e40af);
    border:5px solid #fff; box-shadow:0 8px 0 #1e3a8a, 0 12px 20px rgba(0,0,0,.3);
    display:none; align-items:center; justify-content:center; flex-direction:column;
    font-size:32px; cursor:pointer; touch-action:none;
    transition:transform .08s, box-shadow .08s;
  }
  #horn .lbl { font-size:13px; font-weight:bold; color:#fff; letter-spacing:1px; }
  #horn.pressed { transform:translateY(6px); box-shadow:0 2px 0 #1e3a8a, 0 5px 10px rgba(0,0,0,.3); }

  /* ---------- Overlays ---------- */
  .overlay {
    position:absolute; inset:0; z-index:50;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:3.5vh; background:rgba(126,200,227,.94);
    transition:opacity .45s;
  }
  .overlay.hidden { opacity:0; pointer-events:none; }
  .overlay h1 {
    font-size:clamp(30px,5.6vw,58px); color:#fff;
    text-shadow:0 4px 0 rgba(0,0,0,.15); letter-spacing:1px; text-align:center;
  }
  .btnRow { display:flex; gap:4vw; flex-wrap:wrap; justify-content:center; }
  .modeBtn {
    width:min(300px,40vw); background:#fff; border:6px solid #ffd166; border-radius:32px;
    padding:22px 18px; cursor:pointer; font-family:inherit;
    box-shadow:0 10px 0 #e0a800, 0 14px 24px rgba(0,0,0,.2);
    transition:transform .12s; touch-action:manipulation;
    display:flex; flex-direction:column; align-items:center; gap:8px;
  }
  .modeBtn:active { transform:translateY(6px); box-shadow:0 4px 0 #e0a800; }
  .modeBtn .big { font-size:64px; }
  .modeBtn .ttl { font-size:26px; font-weight:bold; color:#444; }
  .modeBtn .sub { font-size:16px; color:#888; }
  .modeBtn.auto { border-color:#5390d9; box-shadow:0 10px 0 #3a6fb0, 0 14px 24px rgba(0,0,0,.2); }
  .modeBtn.auto:active { box-shadow:0 4px 0 #3a6fb0; }

  .carBtn {
    background:#fff; border:5px solid #ffd166; border-radius:24px;
    padding:10px 12px 4px; cursor:pointer;
    box-shadow:0 8px 0 #e0a800, 0 12px 20px rgba(0,0,0,.2);
    transition:transform .12s; touch-action:manipulation; font-family:inherit;
  }
  .carBtn:active { transform:translateY(6px); box-shadow:0 3px 0 #e0a800; }
  .carBtn canvas { width:132px; height:81px; }
  .carBtn p { font-size:17px; font-weight:bold; color:#555; padding-bottom:3px; }
  #carRow { max-width:94vw; gap:2.4vw; }

  #subScores {
    position:absolute; top:calc(100px + env(safe-area-inset-top)); left:50%;
    transform:translateX(-50%); z-index:30; display:none; pointer-events:none;
    background:rgba(255,255,255,.82); border-radius:14px; padding:4px 14px;
    font-size:12px; font-weight:bold; color:#1d3557; letter-spacing:.3px;
    white-space:nowrap; border:2px solid #fff;
  }
  #subScores b { color:#4361ee; }

  #speedZone {
    position:absolute; bottom:calc(120px + env(safe-area-inset-bottom)); left:50%;
    transform:translateX(-50%); z-index:30; display:none; pointer-events:none;
    width:min(320px,52vw); text-align:center;
  }
  #speedZone.on { display:block; }
  #speedZone .track {
    position:relative; height:12px; border-radius:8px; border:3px solid #fff;
    background:linear-gradient(90deg,#94a3b8 0%,#94a3b8 16%,#2dd36f 16%,#2dd36f 62%,#ff5a5f 62%,#ff5a5f 100%);
    box-shadow:0 3px 8px rgba(0,0,0,.2);
  }
  #speedPip {
    position:absolute; top:-6px; width:16px; height:16px; border-radius:50%;
    background:#fff; border:3px solid #1d3557; margin-left:-8px;
    transition:left .12s linear;
  }
  #speedTxt {
    margin-top:4px; font-size:13px; font-weight:bold; color:#fff;
    text-shadow:0 2px 4px rgba(0,0,0,.5); letter-spacing:1px;
  }
  #speedZone.slow #speedTxt { color:#e2e8f0; }
  #speedZone.good #speedTxt { color:#c6f6d5; }
  #speedZone.fast #speedTxt { color:#ffd0d2; }

  #nextBtn {
    position:absolute; right:20px; top:calc(50% - 24px); z-index:32; display:none;
    align-items:center; justify-content:center;
    padding:14px 22px; border-radius:22px; border:4px solid #fff;
    background:#06d6a0; color:#fff; font-family:inherit;
    font-size:18px; font-weight:bold; letter-spacing:.5px; cursor:pointer;
    box-shadow:0 7px 0 #049f77, 0 10px 18px rgba(0,0,0,.25);
    touch-action:manipulation;
  }
  #nextBtn:active { transform:translateY(5px); box-shadow:0 2px 0 #049f77; }

  /* ---------- inspection screen ---------- */
  #celebrate { justify-content:flex-start; padding-top:2vh; gap:1.2vh; overflow-y:auto; }
  #celebrate h1 { font-size:clamp(24px,4vw,42px); }
  #inspectWrap { display:flex; flex-direction:column; align-items:center; gap:8px; }
  #inspectCv {
    width:min(620px,84vw); height:auto; border-radius:20px;
    background:linear-gradient(#ffffff,#eaf6ff);
    border:5px solid #fff; box-shadow:0 10px 26px rgba(0,0,0,.25);
  }
  #viewBtns { display:flex; gap:10px; }
  .viewBtn {
    padding:7px 18px; border-radius:16px; border:3px solid #fff;
    background:rgba(255,255,255,.45); color:#fff; font-family:inherit;
    font-size:15px; font-weight:bold; cursor:pointer; touch-action:manipulation;
  }
  .viewBtn.active { background:#fff; color:#1d3557; }
  #reportBox {
    background:rgba(255,255,255,.92); border:4px solid #fff; border-radius:18px;
    padding:10px 18px; max-width:min(620px,86vw); width:100%;
    font-size:14px; color:#1d3557; box-shadow:0 8px 20px rgba(0,0,0,.18);
  }
  .repRow {
    display:flex; align-items:center; gap:8px; padding:2px 0;
    font-weight:bold; letter-spacing:.3px;
  }
  .repRow .nm { width:88px; flex:none; }
  .repRow .bar { flex:1; height:11px; border-radius:6px; background:#e2e8f0; overflow:hidden; }
  .repRow .fill { height:100%; border-radius:6px; }
  .repRow .pc { width:44px; text-align:right; flex:none; }
  .repHead {
    font-size:15px; font-weight:bold; color:#4361ee;
    border-bottom:2px solid #e2e8f0; margin-bottom:4px; padding-bottom:3px;
  }
  #bigBtn {
    font-size:clamp(20px,3.4vw,32px); font-weight:bold; color:#fff;
    background:#06d6a0; border:none; border-radius:40px;
    padding:14px 40px; cursor:pointer; font-family:inherit;
    box-shadow:0 10px 0 #049f77, 0 14px 24px rgba(0,0,0,.25);
    transition:transform .12s; touch-action:manipulation;
  }
  #bigBtn:active { transform:translateY(8px); box-shadow:0 2px 0 #049f77; }
  #celebrate h1 { animation:bounceIn .6s; }
  #finalClean {
    display:none; padding:10px 24px; border-radius:999px; background:#fff;
    border:5px solid #22a6d5; color:#12324a; font-size:clamp(24px,4.3vw,42px);
    font-weight:900; letter-spacing:1px; box-shadow:0 8px 18px rgba(0,0,0,.2);
  }
  @keyframes bounceIn { 0%{transform:scale(.3)} 60%{transform:scale(1.15)} 100%{transform:scale(1)} }
  #bigStar { font-size:100px; animation:spinStar 1.4s ease-out; }
  @keyframes spinStar { 0%{transform:scale(0) rotate(-360deg)} 70%{transform:scale(1.3)} 100%{transform:scale(1) rotate(0)} }
</style>
</head>
<body>
<canvas id="main"></canvas>

<div id="phaseStrip"></div>
<div id="stars">⭐ <span id="starN">0</span></div>
<div id="cleanBadge" aria-live="polite">
  <span class="drop">💦</span>
  <span class="cleanCopy"><small id="cleanLabel">CLEAN</small><strong id="cleanPct">0%</strong></span>
</div>
<div id="subScores"></div>
<div id="speedZone" class="good">
  <div class="track"><div id="speedPip"></div></div>
  <div id="speedTxt">PERFECT WASH SPEED</div>
</div>
<button id="homeBtn">🏠</button>
<button id="nextBtn">NEXT ➜</button>
<div id="progWrap"><div id="progFill"></div><div id="progTxt">0%</div></div>
<div id="bubbleMsg">
  <svg viewBox="0 0 60 70" width="32" height="38" aria-hidden="true">
    <path d="M30 4 C40 20 52 30 52 45 a22 22 0 0 1 -44 0 C8 30 20 20 30 4Z" fill="#4cc0f0" stroke="#1d7fb8" stroke-width="3"/>
    <ellipse cx="20" cy="27" rx="5" ry="8" fill="rgba(255,255,255,.55)" transform="rotate(-18 20 27)"/>
    <circle cx="22" cy="42" r="4.5" fill="#12324a"/>
    <circle cx="38" cy="42" r="4.5" fill="#12324a"/>
    <circle cx="23.5" cy="40.5" r="1.6" fill="#fff"/>
    <circle cx="39.5" cy="40.5" r="1.6" fill="#fff"/>
    <path d="M22 52 Q30 59 38 52" stroke="#12324a" stroke-width="3" fill="none" stroke-linecap="round"/>
  </svg>
  <span id="msgTxt"></span>
</div>
<div id="hintHand">👆</div>
<div id="gas" class="pedal"><span class="lbl">GAS</span></div>
<div id="brake" class="pedal"><span class="lbl">BRAKE</span></div>
<div id="horn"><span>📯</span><span class="lbl">HORN</span></div>

<div class="overlay" id="menu">
  <h1>🫧 Sudsy's Car Wash 🫧</h1>
  <div class="btnRow">
    <button class="modeBtn" id="modeManual">
      <span class="big">🧽</span>
      <span class="ttl">I'll wash it!</span>
      <span class="sub">Scrub with your fingers</span>
    </button>
    <button class="modeBtn auto" id="modeAuto">
      <span class="big">🏭</span>
      <span class="ttl">Machine wash!</span>
      <span class="sub">Drive through the tunnel</span>
    </button>
  </div>
</div>

<div class="overlay hidden" id="picker">
  <h1 id="pickTitle">Pick your car!</h1>
  <div class="btnRow" id="carRow"></div>
</div>

<div class="overlay hidden" id="celebrate">
  <h1 id="cheerTxt">Sparkling clean!</h1>
  <div id="finalClean">100% CLEAN</div>
  <div id="inspectWrap">
    <canvas id="inspectCv" width="620" height="330"></canvas>
    <div id="viewBtns">
      <button class="viewBtn active" data-v="side">Side view</button>
      <button class="viewBtn" data-v="top">Overhead</button>
    </div>
  </div>
  <div id="reportBox"></div>
  <button id="bigBtn">Wash another! 🚗</button>
</div>

<script>
"use strict";
/* ============================================================
   SUDSY'S CAR WASH v4
   Modes:  MANUAL — drive in, scrub/rinse/dry/shine by hand, drive out
           AUTO   — drive through a scrolling wash tunnel with
                    soak, foam, mitter curtain, brushes, rinse, dryer
   ============================================================ */
const $=s=>document.querySelector(s);
const cv=$("#main"), g=cv.getContext("2d");
let W=0,H=0,DPR=1;

/* ---------- game state ---------- */
const S={ scene:"menu", mode:null, carType:0, round:0, stars:0,
  t:0, speed:0, pedal:false, brake:false, celebrating:false,
  autoExit:false };
const car={ x:0, y:0, w:0, h:0, spin:0, bounce:0 };
let camX=0, worldLen=0, bayX=0, exitX=0;
let dirtLevel=1, soapLevel=0, dropLevel=0, shineGlow=0, shineTaps=0;
let stations=[];       // auto mode
let manualPhase=-1;
let particles=[];
let lastTouchTime=Date.now();
let autoHomeTimer=null;
let frameScale=1, lastFrameClock=performance.now();
let finalCleanPct=100;

/* ============================================================
   SECTION MODEL — the car is seven washable areas
   ============================================================ */
const SEC={ROOF:0,WINDOWS:1,HOOD:2,DOORS:3,REAR:4,WHEEL_F:5,WHEEL_R:6};
const SEC_NAMES=["Roof","Windows","Hood","Doors","Rear","Front wheel","Rear wheel"];
const BODY_SECS=[0,1,2,3,4];
const WHEEL_SECS=[5,6];
// relative area weight within the body score
const BODY_W=[0.15,0.15,0.25,0.30,0.15];

// per-section wash state
let secs=[];
function blankSecs(){
  secs=[];
  for(let i=0;i<7;i++) secs.push({dirt:0,soft:0,soap:0,peakSoap:0,water:0,wax:0,waxQ:1,grit:0});
}
blankSecs();

// wheel geometry per vehicle kind, in design units (100 x 52)
const WHEELS={
  car:     {f:[76,44,10], r:[24,44,10]},
  truck:   {f:[78,44,10.5], r:[22,44,10.5]},
  bus:     {f:[72,44,10.5], r:[22,44,10.5]},
  police:  {f:[76,44,10], r:[24,44,10]},
  fire:    {f:[80,44,10], r:[18,44,10], r2:[46,44,10]},

// which section does a point in design space belong to?
function sectionAt(xu,yu,kind){
  const wl=WHEELS[kind]||WHEELS.car;
  const hit=(w)=>w && Math.hypot(xu-w[0],yu-w[1])<=w[2];
  if(hit(wl.f)) return SEC.WHEEL_F;
  if(hit(wl.r)||hit(wl.r2)) return SEC.WHEEL_R;
  if(yu<12) return SEC.ROOF;
  if(yu<25) return SEC.WINDOWS;
  if(xu>=70) return SEC.HOOD;
  if(xu<=26) return SEC.REAR;
  return SEC.DOORS;
}
// screen-space shape of a section, for clipped overlay drawing
function clipSection(c,i,x,y,w,kind){
  const h=w*0.52, U=v=>v*w/100;
  const wl=WHEELS[kind]||WHEELS.car;
  c.beginPath();
  if(i===SEC.WHEEL_F){ const q=wl.f; c.arc(x+U(q[0]),y+U(q[1]),U(q[2]),0,7); }
  else if(i===SEC.WHEEL_R){
    const q=wl.r; c.arc(x+U(q[0]),y+U(q[1]),U(q[2]),0,7);
    if(wl.r2){ c.moveTo(x+U(wl.r2[0])+U(wl.r2[2]),y+U(wl.r2[1]));
      c.arc(x+U(wl.r2[0]),y+U(wl.r2[1]),U(wl.r2[2]),0,7); }
  }
  else if(i===SEC.ROOF)    c.rect(x,y,w,U(12));
  else if(i===SEC.WINDOWS) c.rect(x,y+U(12),w,U(13));
  else if(i===SEC.HOOD)    c.rect(x+U(70),y+U(25),U(30),U(27));
  else if(i===SEC.REAR)    c.rect(x,y+U(25),U(26),U(27));
  else                     c.rect(x+U(26),y+U(25),U(44),U(27));
  c.clip();
}
function secClean(i){ return clamp01(1-secs[i].dirt); }

/* ---------- scoring ---------- */
function scoreBody(){
  let t=0,wsum=0;
  BODY_SECS.forEach((s,k)=>{ t+=BODY_W[k]*secClean(s); wsum+=BODY_W[k]; });
  return clamp01(t/wsum);
}
function scoreWheels(){
  return clamp01(WHEEL_SECS.reduce((a,s)=>a+secClean(s),0)/WHEEL_SECS.length);
}
function scoreRinsed(){
  let t=0,wsum=0;
  BODY_SECS.forEach((s,k)=>{ t+=BODY_W[k]*(1-clamp01(secs[s].soap)); wsum+=BODY_W[k]; });
  return clamp01(t/wsum);
}
function scoreFinish(){
  let dry=0, waxed=0, wsum=0;
  BODY_SECS.forEach((s,k)=>{
    dry   += BODY_W[k]*(1-clamp01(secs[s].water));
    waxed += BODY_W[k]*clamp01(secs[s].wax)*clamp01(secs[s].waxQ);
    wsum  += BODY_W[k];
  });
  return clamp01((dry/wsum)*0.5 + (waxed/wsum)*0.5);
}
function scoreOverall(){
  return clamp01(0.55*scoreBody()+0.15*scoreWheels()+0.15*scoreRinsed()+0.15*scoreFinish());
}

/* ---------- coverage grid (manual mode) ---------- */
const GW=26, GH=14;
let cellSec=new Int8Array(GW*GH);      // section index per cell, -1 = off car
let secCells=new Int32Array(7);        // on-car cells per section
let secDirtCells=new Int32Array(7);    // originally-dirty cells per section
let gSoap=new Uint8Array(GW*GH), gWater=new Uint8Array(GW*GH), gWax=new Uint8Array(GW*GH);
let waxQAt=new Float32Array(7);        // wax quality sampled at paint time

function buildCellSections(){
  const kind=CARS[S.carType].kind;
  const tmp=document.createElement("canvas"); tmp.width=GW; tmp.height=GH;
  const tc=tmp.getContext("2d");
  tc.drawImage(maskCv,0,0,GW,GH);
  const img=tc.getImageData(0,0,GW,GH).data;
  secCells.fill(0);
  for(let gy=0;gy<GH;gy++) for(let gx=0;gx<GW;gx++){
    const i=gy*GW+gx;
    if(img[i*4+3]<28){ cellSec[i]=-1; continue; }
    const xu=(gx+0.5)/GW*100, yu=(gy+0.5)/GH*52;
    const s=sectionAt(xu,yu,kind);
    cellSec[i]=s; secCells[s]++;
  }
  for(let s=0;s<7;s++) if(secCells[s]===0) secCells[s]=1;
}

/* derive section state from the manual-mode grids */
function recomputeManualSecs(){
  const remain=new Int32Array(7), soapN=new Int32Array(7),
        waterN=new Int32Array(7), waxN=new Int32Array(7);
  for(let i=0;i<GW*GH;i++){
    const s=cellSec[i]; if(s<0) continue;
    if(grid[i]===1) remain[s]++;
    if(gSoap[i]) soapN[s]++;
    if(gWater[i]) waterN[s]++;
    if(gWax[i]) waxN[s]++;
  }
  for(let s=0;s<7;s++){
    secs[s].dirt  = secDirtCells[s]>0 ? remain[s]/secDirtCells[s] : 0;
    secs[s].soap  = soapN[s]/secCells[s];
    secs[s].water = waterN[s]/secCells[s];
    secs[s].wax   = waxN[s]/secCells[s];
    secs[s].waxQ  = waxQAt[s]||1;
  }
}
function fillGrid(arr,val){
  for(let i=0;i<GW*GH;i++) arr[i]=(cellSec[i]>=0)?val:0;
}

   ============================================================ */
let AC=null, noiseBuf=null;
let machineSrc=null, machineFilter=null, machineGain=null, machineType=null;
let engineOsc=null, engineGain=null;
function initAudio(){
  if(AC){ if(AC.state==="suspended") AC.resume(); return; }
  AC=new (window.AudioContext||window.webkitAudioContext)();
  const len=AC.sampleRate*1.5;
  noiseBuf=AC.createBuffer(1,len,AC.sampleRate);
  const d=noiseBuf.getChannelData(0);
  for(let i=0;i<len;i++) d[i]=Math.random()*2-1;
}
function ensureMachine(){
  if(!AC||machineSrc) return;
  machineSrc=AC.createBufferSource(); machineSrc.buffer=noiseBuf; machineSrc.loop=true;
  machineFilter=AC.createBiquadFilter();
  machineGain=AC.createGain(); machineGain.gain.value=0;
  machineSrc.connect(machineFilter).connect(machineGain).connect(AC.destination);
  machineSrc.start();
}
function setMachine(type){
  if(!AC) return;
  ensureMachine();
  if(type===machineType) return;
  machineType=type;
  const now=AC.currentTime;
  if(type==="spray"){ machineFilter.type="bandpass"; machineFilter.frequency.setTargetAtTime(3200,now,0.05); machineFilter.Q.value=0.7;
    machineGain.gain.setTargetAtTime(0.14,now,0.06); }
  else if(type==="brush"){ machineFilter.type="lowpass"; machineFilter.frequency.setTargetAtTime(320,now,0.05);
    machineGain.gain.setTargetAtTime(0.2,now,0.06); }
  else if(type==="dryer"){ machineFilter.type="bandpass"; machineFilter.frequency.setTargetAtTime(1400,now,0.05); machineFilter.Q.value=0.4;
    machineGain.gain.setTargetAtTime(0.22,now,0.06); }
  else if(type==="foam"){ machineFilter.type="bandpass"; machineFilter.frequency.setTargetAtTime(700,now,0.05); machineFilter.Q.value=0.6;
    machineGain.gain.setTargetAtTime(0.1,now,0.06); }
  else { machineGain.gain.setTargetAtTime(0,now,0.1); }
}
function setEngine(on, speed){
  if(!AC) return;
  if(on && !engineOsc){
    engineOsc=AC.createOscillator(); engineOsc.type="sawtooth";
    const f=AC.createBiquadFilter(); f.type="lowpass"; f.frequency.value=240;
    engineGain=AC.createGain(); engineGain.gain.value=0;
    engineOsc.connect(f).connect(engineGain).connect(AC.destination);
    engineOsc.start();
  }
  if(engineOsc){
    const now=AC.currentTime;
    engineOsc.frequency.setTargetAtTime(50+speed*22, now, 0.08);
    engineGain.gain.setTargetAtTime(on?0.055:0, now, 0.12);
  }
}
function blip(freq,dur=0.09,type="sine",vol=0.18){
  if(!AC) return;
  const o=AC.createOscillator(), gn=AC.createGain();
  o.type=type; o.frequency.value=freq;
  gn.gain.setValueAtTime(vol,AC.currentTime);
  gn.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+dur);
  o.connect(gn).connect(AC.destination); o.start(); o.stop(AC.currentTime+dur);
}

  o.frequency.setValueAtTime(900+Math.random()*300,AC.currentTime);
  o.frequency.linearRampToValueAtTime(1450+Math.random()*400,AC.currentTime+0.12);
  gn.gain.setValueAtTime(0.08,AC.currentTime);

}

    c.beginPath(); c.moveTo(x+U(8),y+U(15)); c.lineTo(x+U(62),y+U(12)); c.stroke();
    for(let li=0;li<8;li++){
      const t2=li/7, lxx=x+U(10+t2*49);
      c.beginPath();
      c.moveTo(lxx,y+U(11.5-3*t2));
      c.lineTo(lxx,y+U(15-3*t2)); c.stroke();
    }
    // equipment panel lines
    c.strokeStyle="rgba(0,0,0,.18)"; c.lineWidth=U(0.8);
    for(let li=1;li<4;li++){
      c.beginPath(); c.moveTo(x+U(10+li*14),y+U(18)); c.lineTo(x+U(10+li*14),y+U(42)); c.stroke();

  } else if(cfg.kind==="race"){

    c.quadraticCurveTo(x+U(38),y+U(13),x+U(50),y+U(13));
    c.quadraticCurveTo(x+U(60),y+U(13),x+U(66),y+U(22));
    c.quadraticCurveTo(x+U(80),y+U(24),x+U(92),y+U(30));
    c.quadraticCurveTo(x+U(97),y+U(33),x+U(96),y+U(38));
    c.quadraticCurveTo(x+U(95),y+U(44),x+U(88),y+U(44));
    c.lineTo(x+U(12),y+U(44));
    c.quadraticCurveTo(x+U(5),y+U(44),x+U(4),y+U(40));

    windows(c,[[x+U(41),y+U(15),U(17),U(9)]],U);
    // spoiler

    // racing stripe
    c.fillStyle="rgba(255,255,255,.75)";
    rr(c,x+U(14),y+U(29),U(52),U(2.8),U(1.4)); c.fill();
    // number roundel
    c.fillStyle="#fff";
    c.beginPath(); c.arc(x+U(76),y+U(33),U(6),0,7); c.fill();
    c.strokeStyle=cfg.trim; c.lineWidth=U(1); c.stroke();
    c.fillStyle="#1d3557";
    c.font=`bold ${U(7)}px "Arial Rounded MT Bold","Comic Sans MS",sans-serif`;
    c.textAlign="center"; c.textBaseline="middle";
    c.fillText("8",x+U(76),y+U(33.5));
    wheel(c,x+U(24),y+U(44),U(8.5),spin); wheel(c,x+U(78),y+U(44),U(8.5),spin);
    light(c,x+U(93),y+U(34),U(2.6),"#fff3b0");
  } else if(cfg.kind==="monster"){
    // frame + struts
    c.fillStyle="#343a40";
    rr(c,x+U(18),y+U(28),U(64),U(5),U(2)); c.fill();
    c.strokeStyle="#6c757d"; c.lineWidth=U(2.2);
    c.beginPath(); c.moveTo(x+U(28),y+U(33)); c.lineTo(x+U(30),y+U(40)); c.stroke();
    c.beginPath(); c.moveTo(x+U(72),y+U(33)); c.lineTo(x+U(70),y+U(40)); c.stroke();

    c.fillStyle=bg; c.strokeStyle=cfg.trim; c.lineWidth=U(1.1);

    c.quadraticCurveTo(x+U(20),y+U(13),x+U(24),y+U(13));
    c.lineTo(x+U(38),y+U(13)); c.lineTo(x+U(44),y+U(4));
    c.quadraticCurveTo(x+U(45),y+U(2.5),x+U(48),y+U(2.5));
    c.lineTo(x+U(62),y+U(2.5));
    c.quadraticCurveTo(x+U(66),y+U(2.5),x+U(67),y+U(5.5));
    c.lineTo(x+U(70),y+U(13)); c.lineTo(x+U(78),y+U(13));
    c.quadraticCurveTo(x+U(80),y+U(13),x+U(80),y+U(16));
    c.lineTo(x+U(80),y+U(28));
    c.closePath(); c.fill(); c.stroke();
    windows(c,[[x+U(47),y+U(5),U(14),U(8)]],U);
    // lightning decal
    c.fillStyle="#ffd60a";
    c.beginPath();
    c.moveTo(x+U(28),y+U(17)); c.lineTo(x+U(36),y+U(17)); c.lineTo(x+U(32),y+U(21));
    c.lineTo(x+U(38),y+U(21)); c.lineTo(x+U(27),y+U(27)); c.lineTo(x+U(31),y+U(22));
    c.lineTo(x+U(26),y+U(22)); c.closePath(); c.fill();
    // giant wheels
    wheel(c,x+U(28),y+U(39),U(13.2),spin);
    wheel(c,x+U(72),y+U(39),U(13.2),spin);
  }
  if(glow>0.02){
    c.globalAlpha=Math.min(0.35,glow*0.35);
    c.fillStyle="#fff";
    rr(c,x+U(2),y+U(4),U(96),U(42),U(10)); c.fill();
    c.globalAlpha=1;
  }
  c.restore();
}
function gloss(c,x,y,w,h){
  c.save();
  c.globalAlpha=0.30;
  c.fillStyle="#fff";
  c.beginPath();
  c.ellipse(x+w*0.40,y+h*0.62,w*0.36,h*0.085,-0.05,0,7);
  c.fill();
  c.globalAlpha=0.18;
  c.beginPath();
  c.ellipse(x+w*0.55,y+h*0.74,w*0.28,h*0.05,-0.03,0,7);
  c.fill();
  c.restore();
}
function windows(c,list,U){
  c.save();
  list.forEach(([wx,wy,ww,wh])=>{
    const gr=c.createLinearGradient(wx,wy,wx+ww,wy+wh);
    gr.addColorStop(0,"#dff6ff"); gr.addColorStop(1,"#8ecae6");
    c.fillStyle=gr; rr(c,wx,wy,ww,wh,U(2.5)); c.fill();
    c.strokeStyle="rgba(255,255,255,.9)"; c.lineWidth=U(0.9); c.stroke();
    c.strokeStyle="rgba(255,255,255,.8)"; c.lineWidth=U(1.4);
    c.beginPath(); c.moveTo(wx+ww*0.2,wy+wh*0.85); c.lineTo(wx+ww*0.65,wy+wh*0.15); c.stroke();
  });
  c.restore();
}
function wheel(c,cx,cy,r,spin){
  c.save();
  c.fillStyle="#212529"; c.beginPath(); c.arc(cx,cy,r,0,7); c.fill();
  c.fillStyle="#adb5bd"; c.beginPath(); c.arc(cx,cy,r*0.55,0,7); c.fill();
  c.strokeStyle="#495057"; c.lineWidth=r*0.16;
  for(let i=0;i<5;i++){
    const a=spin+i*Math.PI*2/5;
    c.beginPath(); c.moveTo(cx,cy);
    c.lineTo(cx+Math.cos(a)*r*0.5,cy+Math.sin(a)*r*0.5); c.stroke();
  }
  c.fillStyle="#dee2e6"; c.beginPath(); c.arc(cx,cy,r*0.14,0,7); c.fill();
  c.restore();
}
function light(c,cx,cy,r,col){
  c.save(); c.fillStyle=col; c.beginPath(); c.arc(cx,cy,r,0,7); c.fill();
  c.strokeStyle="rgba(0,0,0,.2)"; c.lineWidth=r*0.25; c.stroke(); c.restore();
}
function doorLine(c,x,y1,y2,U){
  c.save(); c.strokeStyle="rgba(0,0,0,.25)"; c.lineWidth=U(0.9);
  c.beginPath(); c.moveTo(x,y1); c.lineTo(x,y2); c.stroke();
  c.beginPath(); c.arc(x+U(3),(y1+y2)/2,U(1.3),0,7); c.stroke();
  c.restore();
}

/* ============================================================
   CAR-LOCAL LAYERS — dirt, soap, droplets
   ============================================================ */
let dirtSeed=[];
function genDirt(){
  const kind=CARS[S.carType].kind;
  const count=26+S.round*6;
  dirtSeed=[];
  for(let i=0;i<count;i++){
    const roll=Math.random();
    // bias grime downward — real cars are dirtiest low down and around the arches
    const low=Math.random()<0.55;
    const yu=low ? (30+Math.random()*20) : (5+Math.random()*30);
    const xu=4+Math.random()*92;
    dirtSeed.push({
      x:LW*(xu/100), y:LH*(yu/52),
      r:LW*(0.028+Math.random()*0.055),
      type:roll<0.6?"mud":(roll<0.85?"grass":"bird"),
      sec:sectionAt(xu,yu,kind),
      tone:Math.random(), lobes:3+Math.floor(Math.random()*4), rot:Math.random()*7
    });
  }
  drawDirtLayer();
  applyMask(dc);
  // build coverage grid from the dirt that actually survived the mask
  const tmp=document.createElement("canvas"); tmp.width=GW; tmp.height=GH;
  const tc=tmp.getContext("2d");
  tc.drawImage(dirtCv,0,0,GW,GH);
  const img=tc.getImageData(0,0,GW,GH).data;
  grid.fill(0); gridTotal=0;
  secDirtCells.fill(0);
  for(let i=0;i<GW*GH;i++){
    if(img[i*4+3]>28 && cellSec[i]>=0){
      grid[i]=1; gridTotal++;
      secDirtCells[cellSec[i]]++;
    }
  }
  if(gridTotal<1) gridTotal=1;

  // seed section state: every section starts as dirty as its share of grime
  blankSecs();
  const gritN=new Float32Array(7), allN=new Float32Array(7);
  dirtSeed.forEach(s=>{ allN[s.sec]++; if(s.type==="bird") gritN[s.sec]++; });
  for(let s=0;s<7;s++){
    secs[s].dirt = secDirtCells[s]>0 ? 1 : 0;
    secs[s].grit = allN[s]>0 ? gritN[s]/allN[s] : 0;
    secs[s].waxQ = 1;
  }
  gSoap.fill(0); gWater.fill(0); gWax.fill(0); waxQAt.fill(1);
}
function drawDirtLayer(){
  dc.clearRect(0,0,LW,LH);
  dirtSeed.forEach(s=>{
    let col,core;
    if(s.type==="grass"){ col=s.tone<0.5?"#5a7d3c":"#6f9a4b"; core="rgba(45,70,25,.5)"; }
    else if(s.type==="bird"){ col=s.tone<0.5?"#f4f1ea":"#e9e4d8"; core="rgba(140,135,120,.55)"; }
    else { col=s.tone<0.5?"#6f4e37":"#8a5a44"; core="rgba(60,40,25,.5)"; }
    dc.fillStyle=col;
    dc.globalAlpha=0.88;
    dc.beginPath();
    for(let l=0;l<=s.lobes*2;l++){
      const a=s.rot+l*Math.PI/s.lobes;
      const rad=s.r*(0.7+0.3*Math.sin(l*2.7+s.rot*3));
      const vx=s.x+Math.cos(a)*rad, vy=s.y+Math.sin(a)*rad*0.8;
      l===0?dc.moveTo(vx,vy):dc.quadraticCurveTo(s.x+Math.cos(a-0.3)*rad*1.15,s.y+Math.sin(a-0.3)*rad*0.9,vx,vy);
    }
    dc.closePath(); dc.fill();
    dc.fillStyle=core;
    dc.beginPath(); dc.arc(s.x,s.y,s.r*0.4,0,7); dc.fill();
    if(s.type==="bird"){
      // drippy tail
      dc.strokeStyle="rgba(233,228,216,.85)"; dc.lineWidth=s.r*0.22; dc.lineCap="round";
      dc.beginPath(); dc.moveTo(s.x,s.y+s.r*0.5);
      dc.quadraticCurveTo(s.x+s.r*0.2,s.y+s.r*1.1,s.x,s.y+s.r*1.6); dc.stroke();
    }
  });
  dc.globalAlpha=1;
}
function fillFoam(){       // full pre-rendered suds blanket (auto mode)
  sc.clearRect(0,0,LW,LH);
  const cols=["rgba(255,255,255,.95)","rgba(255,182,213,.85)","rgba(178,222,255,.85)"];
  for(let i=0;i<160;i++){
    const x=Math.random()*LW, y=LH*0.02+Math.random()*LH*0.86, r=LW*0.018+Math.random()*LW*0.04;
    const col=cols[i%3];
    const gr=sc.createRadialGradient(x-r*0.3,y-r*0.3,r*0.1,x,y,r);
    gr.addColorStop(0,"rgba(255,255,255,.98)"); gr.addColorStop(0.7,col); gr.addColorStop(1,"rgba(255,255,255,0)");
    sc.fillStyle=gr; sc.beginPath(); sc.arc(x,y,r,0,7); sc.fill();
  }
  applyMask(sc);
}
function paintSoapLocal(lx,ly,r){
  for(let i=0;i<4;i++){
    const a=Math.random()*7, d=Math.random()*r*0.8;
    const bx=lx+Math.cos(a)*d, by=ly+Math.sin(a)*d, br=r*(0.25+Math.random()*0.4);
    const gr=sc.createRadialGradient(bx-br*0.3,by-br*0.3,br*0.1,bx,by,br);
    gr.addColorStop(0,"rgba(255,255,255,.95)");
    gr.addColorStop(0.7,"rgba(230,245,255,.8)");
    gr.addColorStop(1,"rgba(200,230,255,.25)");
    sc.fillStyle=gr; sc.beginPath(); sc.arc(bx,by,br,0,7); sc.fill();
  }
}
function paintWaxLocal(lx,ly,r){
  for(let i=0;i<4;i++){
    const a=Math.random()*7, d=Math.random()*r*0.8;
    const bx=lx+Math.cos(a)*d, by=ly+Math.sin(a)*d, br=r*(0.22+Math.random()*0.35);
    const gr=sc.createRadialGradient(bx-br*0.3,by-br*0.3,br*0.1,bx,by,br);
    gr.addColorStop(0,"rgba(255,244,180,.95)");
    gr.addColorStop(0.7,"rgba(255,214,90,.7)");
    gr.addColorStop(1,"rgba(255,200,60,.15)");
    sc.fillStyle=gr; sc.beginPath(); sc.arc(bx,by,br,0,7); sc.fill();
  }
}
function paintDropLocal(lx,ly,r){
  for(let i=0;i<5;i++){
    const a=Math.random()*7, d=Math.random()*r;
    const bx=lx+Math.cos(a)*d, by=ly+Math.sin(a)*d, br=LW*0.004+Math.random()*LW*0.007;
    const gr=pc.createRadialGradient(bx-br*0.3,by-br*0.35,br*0.1,bx,by,br);
    gr.addColorStop(0,"rgba(255,255,255,.95)");
    gr.addColorStop(0.5,"rgba(160,215,250,.75)");
    gr.addColorStop(1,"rgba(120,190,240,.35)");
    pc.fillStyle=gr; pc.beginPath(); pc.ellipse(bx,by,br*0.8,br,0,0,7); pc.fill();
  }
  // occasional run-off streak
  if(Math.random()<0.25){
    pc.strokeStyle="rgba(190,225,250,.45)"; pc.lineCap="round";
    pc.lineWidth=3+Math.random()*3;
    pc.beginPath(); pc.moveTo(lx,ly);
    pc.quadraticCurveTo(lx+6,ly+r*0.8,lx,ly+r*1.5); pc.stroke();
  }
  dropDirty=true;
}
function fillDroplets(){
  pc.clearRect(0,0,LW,LH);
  for(let i=0;i<80;i++){
    const x=Math.random()*LW, y=Math.random()*LH*0.9, r=LW*0.004+Math.random()*LW*0.008;
    const gr=pc.createRadialGradient(x-r*0.3,y-r*0.35,r*0.1,x,y,r);
    gr.addColorStop(0,"rgba(255,255,255,.95)");
    gr.addColorStop(0.5,"rgba(160,215,250,.75)");
    gr.addColorStop(1,"rgba(120,190,240,.35)");
    pc.fillStyle=gr; pc.beginPath(); pc.ellipse(x,y,r*0.8,r,0,0,7); pc.fill();
  }
  // running streaks
  pc.strokeStyle="rgba(190,225,250,.5)"; pc.lineCap="round";
  for(let i=0;i<24;i++){
    const x=Math.random()*LW, y=Math.random()*LH*0.5, len=LH*0.1+Math.random()*LH*0.25;
    pc.lineWidth=3+Math.random()*4;
    pc.beginPath(); pc.moveTo(x,y);
    pc.quadraticCurveTo(x+7,y+len*0.5,x,y+len); pc.stroke();
  }
  applyMask(pc);
}
function eraseLocal(c2,lx,ly,r){
  c2.save(); c2.globalCompositeOperation="destination-out";
  const gr=c2.createRadialGradient(lx,ly,r*0.3,lx,ly,r);
  gr.addColorStop(0,"rgba(0,0,0,1)"); gr.addColorStop(1,"rgba(0,0,0,0)");
  c2.fillStyle=gr; c2.beginPath(); c2.arc(lx,ly,r,0,7); c2.fill();
  c2.restore();
}
function markGridLocal(lx,ly,r,arr){
  const gx0=Math.floor((lx-r)/LW*GW), gx1=Math.floor((lx+r)/LW*GW);
  const gy0=Math.floor((ly-r)/LH*GH), gy1=Math.floor((ly+r)/LH*GH);
  for(let gy=Math.max(0,gy0);gy<=Math.min(GH-1,gy1);gy++)
    for(let gx=Math.max(0,gx0);gx<=Math.min(GW-1,gx1);gx++){
      const i=gy*GW+gx;
      if(arr===grid){ if(grid[i]===1) grid[i]=2; }
      else arr[i]=1;
    }
}
function clearedFrac(){
  let n=0; for(let i=0;i<grid.length;i++) if(grid[i]===2) n++;
  return n/gridTotal;
}
function coverFrac(){
  let n=0; for(let i=0;i<cover.length;i++) n+=cover[i];
  return n/(GW*GH);
}

function spawnConfetti(){

  for(let i=0;i<130;i++) P({k:"conf",x:Math.random()*W,y:-20-Math.random()*H*0.4,world:false,
    r:5+Math.random()*7,vx:(Math.random()-0.5)*2,vy:2+Math.random()*3.5,life:1,
    col:cols[i%cols.length],rot:Math.random()*7,vr:(Math.random()-0.5)*0.25});

function drawParticles(){
  particles=particles.filter(p=>p.life>0&&p.y<H+60);
  for(const p of particles){
    p.x+=p.vx; p.y+=p.vy;
    const sx=p.world?p.x-camX:p.x, sy=p.y;
    if(sx<-60||sx>W+60) { if(p.k!=="conf") p.life=0; continue; }
    if(p.k==="water"){ p.vy+=0.25; p.life-=0.03;
      g.fillStyle=`rgba(120,200,250,${Math.max(0,p.life*0.8)})`;
      g.beginPath(); g.arc(sx,sy,p.r,0,7); g.fill();
    } else if(p.k==="foam"){ p.vx*=0.92; p.vy*=0.92; p.life-=0.02;
      g.fillStyle=p.col; g.globalAlpha=Math.max(0,p.life*0.85);
      g.beginPath(); g.arc(sx,sy,p.r,0,7); g.fill(); g.globalAlpha=1;
    } else if(p.k==="bubble"){ p.wob+=0.1; p.x+=Math.sin(p.wob)*0.6; p.life-=0.012;
      const a=Math.max(0,p.life);
      g.strokeStyle=`rgba(255,255,255,${a*0.9})`;
      g.fillStyle=`rgba(220,240,255,${a*0.35})`; g.lineWidth=2;
      g.beginPath(); g.arc(sx,sy,p.r,0,7); g.fill(); g.stroke();
      g.fillStyle=`rgba(255,255,255,${a*0.9})`;
      g.beginPath(); g.arc(sx-p.r*0.35,sy-p.r*0.35,p.r*0.22,0,7); g.fill();
    } else if(p.k==="spark"){ p.life-=0.02; p.rot+=0.08;
      g.save(); g.translate(sx,sy); g.rotate(p.rot);
      g.fillStyle=`rgba(255,240,150,${Math.max(0,p.life)})`;
      star4(g,p.r*p.life+2); g.restore();
    } else if(p.k==="wind"){ p.life-=0.04;
      g.strokeStyle=`rgba(255,255,255,${Math.max(0,p.life*0.7)})`;
      g.lineWidth=3; g.beginPath();
      g.moveTo(sx-p.r,sy); g.quadraticCurveTo(sx,sy-6,sx+p.r,sy); g.stroke();
    } else if(p.k==="conf"){ p.vy+=0.03; p.rot+=p.vr; p.life-=0.004;
      g.save(); g.translate(sx,sy); g.rotate(p.rot);
      g.fillStyle=p.col; g.globalAlpha=Math.max(0,p.life);
      g.fillRect(-p.r/2,-p.r/3,p.r,p.r*0.66); g.restore(); g.globalAlpha=1;
    }
  }
}
function star4(c,r){
  c.beginPath();
  for(let i=0;i<8;i++){
    const a=i*Math.PI/4, rad=(i%2===0)?r:r*0.35;
    i===0?c.moveTo(Math.cos(a)*rad,Math.sin(a)*rad):c.lineTo(Math.cos(a)*rad,Math.sin(a)*rad);
  }
  c.closePath(); c.fill();
}

/* ============================================================
   LAYOUT / WORLD SETUP
   ============================================================ */
function resize(){
  DPR=Math.min(window.devicePixelRatio||1,2);
  W=window.innerWidth; H=window.innerHeight;
  cv.width=W*DPR; cv.height=H*DPR;
  g.setTransform(DPR,0,0,DPR,0,0);
  car.w=Math.min(W*0.42,H*0.6,430);
  car.h=car.w*0.52;
  car.y=roadTop()-car.h*0.965;
  if(S.mode==="auto") buildAutoWorld(true);
  if(S.mode==="manual") buildManualWorld(true);
}
function roadTop(){ return H*0.76; }
window.addEventListener("resize",resize);

function buildManualWorld(keepPos){
  bayX=W/2-car.w/2;
  exitX=W+car.w*1.3;
  worldLen=W;
  if(!keepPos) car.x=-car.w*1.1;
  camX=0;
}
function buildAutoWorld(keepPos){
  const gap=car.w*1.55, start=W*0.75;
  const defs=[
    {key:"soak",  icon:"💧", lbl:"RINSE"},
    {key:"foam",  icon:"🫧", lbl:"FOAM"},
    {key:"wheels",icon:"🛞", lbl:"WHEELS"},
    {key:"mitter",icon:"🧹", lbl:"WIGGLE"},
    {key:"brush", icon:"🌀", lbl:"SCRUB"},
    {key:"rinse", icon:"🚿", lbl:"RINSE"},
    {key:"wax",   icon:"🌈", lbl:"WAX"},
    {key:"dry",   icon:"💨", lbl:"DRY"},
  ];
  stations=defs.map((d,i)=>({...d, x:start+gap*(i+1), passed:false, progress:0, rated:false}));
  exitX=start+gap*(defs.length+1.6);
  worldLen=exitX+W*0.7;
  if(!keepPos){ car.x=car.w*0.15; camX=0; }
}

/* ============================================================
   DRAW — background, tunnel, stations, car
   ============================================================ */
const SKIES=[
  {top:"#4facdd",mid:"#8fd3f4",bot:"#d8f3ff",hill:"#a8d672",sun:"#ffdd55",halo:"255,236,150",cloud:.9,night:false},
  {top:"#f4845f",mid:"#ffb47a",bot:"#ffe3b8",hill:"#8fbf5a",sun:"#ff6b35",halo:"255,150,80", cloud:.75,night:false},
  {top:"#2b3a8f",mid:"#5a6fd0",bot:"#93a3e8",hill:"#4e7a42",sun:"#f4f1de",halo:"244,241,222",cloud:.3,night:true},
];
function drawSky(){
  const pal=SKIES[S.round%SKIES.length];
  const sky=g.createLinearGradient(0,0,0,H*0.7);
  sky.addColorStop(0,pal.top); sky.addColorStop(0.55,pal.mid); sky.addColorStop(1,pal.bot);
  g.fillStyle=sky; g.fillRect(0,0,W,H*0.76);
  // stars at night
  if(pal.night){
    g.fillStyle="rgba(255,255,255,.9)";
    for(let i=0;i<40;i++){
      const sx2=((i*173.3)%W), sy2=((i*97.7)%(H*0.5));
      const tw=0.5+0.5*Math.sin(S.t*0.05+i);
      g.globalAlpha=0.3+0.6*tw;
      g.fillRect(sx2,sy2,2.2,2.2);
    }
    g.globalAlpha=1;
  }
  // sun (or moon) with soft glow
  const sunR=Math.min(W,H)*0.055;
  const halo=g.createRadialGradient(W*0.86,H*0.12,sunR*0.4,W*0.86,H*0.12,sunR*3);
  halo.addColorStop(0,`rgba(${pal.halo},.85)`); halo.addColorStop(1,`rgba(${pal.halo},0)`);
  g.fillStyle=halo; g.fillRect(W*0.86-sunR*3,H*0.12-sunR*3,sunR*6,sunR*6);
  g.fillStyle=pal.sun;
  g.beginPath(); g.arc(W*0.86,H*0.12,sunR,0,7); g.fill();
  if(pal.night){ // moon crater shading
    g.fillStyle="rgba(160,160,180,.35)";
    g.beginPath(); g.arc(W*0.86-sunR*0.25,H*0.12-sunR*0.15,sunR*0.28,0,7); g.fill();
    g.beginPath(); g.arc(W*0.86+sunR*0.3,H*0.12+sunR*0.3,sunR*0.18,0,7); g.fill();
  }
  g.fillStyle=`rgba(255,255,255,${pal.cloud})`;
  const par=camX*0.2;
  [[0.15,0.12,1],[0.5,0.07,0.7],[0.78,0.17,0.85]].forEach(([fx,fy,s],i)=>{
    const x=((W*fx - par + i*130)%(W+240))-120, y=H*fy, r=Math.min(W,H)*0.032*s;
    [[0,0,1.2],[1.1,0.1,1],[-1.1,0.15,0.9],[0.5,-0.5,0.8],[-0.5,-0.45,0.75]].forEach(([dx,dy,rs])=>{
      g.beginPath(); g.arc(x+dx*r,y+dy*r,r*rs,0,7); g.fill();
    });
  });
  // hills (slow parallax)
  g.fillStyle=pal.hill;
  const hp=camX*0.35;
  g.beginPath(); g.moveTo(0,H*0.76);
  for(let x=0;x<=W;x+=40){
    g.lineTo(x, H*0.72 + Math.sin((x+hp)*0.008)*H*0.028);
  }
  g.lineTo(W,H); g.lineTo(0,H); g.fill();
  // palms (parallax)
  const pp=camX*0.55;
  for(let i=0;i<6;i++){
    const px=((i*W*0.34 - pp)%(W*1.4+300));
    const x=(px<-150?px+W*1.4+300:px)-150;
    palm(x, roadTop()+2, 0.75+((i*37)%3)*0.14, i%2===0?1:-1);
  }
  // road — wet asphalt
  const rg=g.createLinearGradient(0,roadTop(),0,H);
  rg.addColorStop(0,"#6f7a8c"); rg.addColorStop(0.35,"#8d99ae"); rg.addColorStop(1,"#aab3c2");
  g.fillStyle=rg; g.fillRect(0,roadTop(),W,H-roadTop());
  // sheen streak
  const sheen=g.createLinearGradient(0,roadTop(),0,roadTop()+H*0.1);
  sheen.addColorStop(0,"rgba(255,255,255,.35)"); sheen.addColorStop(1,"rgba(255,255,255,0)");
  g.fillStyle=sheen; g.fillRect(0,roadTop(),W,H*0.1);
  g.fillStyle="rgba(255,255,255,.9)";
  const dashW=W*0.055, off=-(camX%(dashW*2));
  for(let x=off;x<W;x+=dashW*2){ rr(g,x,H*0.885,dashW,H*0.011,6); g.fill(); }
  drawWetSurfaceDetails();
}
function drawWetSurfaceDetails(){
  const top=roadTop(), floorH=H-top;
  // Broad reflected light bands make the pavement read as wet rather than flat gray.
  g.save();
  g.globalCompositeOperation="screen";
  for(let i=0;i<5;i++){
    const px=((i*W*0.31-camX*0.42)%(W+260))-130;
    const w=Math.max(90,W*0.18);
    const grad=g.createLinearGradient(px,top,px+w,top+floorH);
    grad.addColorStop(0,"rgba(255,255,255,.02)");
    grad.addColorStop(.45,"rgba(150,220,255,.13)");
    grad.addColorStop(1,"rgba(255,255,255,0)");
    g.fillStyle=grad;
    g.beginPath();
    g.moveTo(px,top); g.lineTo(px+w*.34,top); g.lineTo(px+w,H); g.lineTo(px-w*.1,H);
    g.closePath(); g.fill();
  }
  g.restore();

  // Stable puddles and drain grates: no frame-to-frame random flicker.
  for(let i=0;i<7;i++){
    const px=((i*233-camX*.72)%(W+360))-180;
    const py=top+floorH*(.28+((i*37)%55)/100);
    const pw=70+((i*29)%80), ph=7+((i*17)%10);
    const puddle=g.createRadialGradient(px,py,1,px,py,pw*.58);
    puddle.addColorStop(0,"rgba(204,239,255,.18)");
    puddle.addColorStop(.7,"rgba(70,112,145,.11)");
    puddle.addColorStop(1,"rgba(30,55,75,0)");
    g.fillStyle=puddle; g.beginPath(); g.ellipse(px,py,pw,ph,0,0,7); g.fill();
  }
  if(S.scene==="auto"){
    const gy=top+floorH*.72;
    g.fillStyle="rgba(28,43,55,.72)";
    for(let x=-(camX%84)-84;x<W+84;x+=84){ rr(g,x,gy,55,8,2); g.fill(); }
    g.strokeStyle="rgba(190,212,225,.42)"; g.lineWidth=1;
    for(let x=-(camX%84)-84;x<W+84;x+=84){
      for(let j=0;j<5;j++){ g.beginPath(); g.moveTo(x+8+j*9,gy+1); g.lineTo(x+8+j*9,gy+7); g.stroke(); }
    }
  }
}

function palm(x,baseY,s,lean){
  if(x<-160||x>W+160) return;
  g.save(); g.translate(x,baseY);
  g.strokeStyle="#8d6e4b"; g.lineWidth=11*s; g.lineCap="round";
  g.beginPath(); g.moveTo(0,0);
  g.quadraticCurveTo(lean*18*s,-70*s,lean*32*s,-125*s); g.stroke();
  const tx=lean*32*s, ty=-125*s;
  g.strokeStyle="#3f9d4e"; g.lineWidth=9*s;
  for(let i=0;i<6;i++){
    const a=-Math.PI/2+(i-2.5)*0.52;
    g.beginPath(); g.moveTo(tx,ty);
    g.quadraticCurveTo(tx+Math.cos(a)*42*s,ty+Math.sin(a)*42*s-10*s,
                       tx+Math.cos(a)*74*s,ty+Math.sin(a)*74*s+20*s);
    g.stroke();
  }
  g.fillStyle="#8d6e4b";
  g.beginPath(); g.arc(tx,ty,7*s,0,7); g.fill();
  g.restore();
}

function drawShop(){

  g.fillStyle="#cdeffd"; rr(g,bx+bw*0.10,by+bh*0.37,bw*0.18,bh*0.2,5); g.fill();
  g.fillStyle="#b7efc5"; rr(g,bx+bw*0.105,by+bh*0.60,bw*0.17,bh*0.11,4); g.fill();

function drawTunnel(){
  // long building spanning stations
  const x0=stations[0].x-car.w*0.75-camX;
  const x1=stations[stations.length-1].x+car.w*0.95-camX;
  const topY=H*0.12, roofH=H*0.09, wallB=roadTop();
  if(x1<-50||x0>W+50) { /* still draw entrance/exit signs below */ }
  // interior wall
  g.fillStyle="rgba(67,97,238,.14)";
  g.fillRect(Math.max(-50,x0),topY+roofH,Math.min(W+100,x1)-Math.max(-50,x0),wallB-(topY+roofH));
  // wall panels, seams, and a darker baseboard add industrial depth.
  g.strokeStyle="rgba(41,73,99,.20)"; g.lineWidth=2;
  const panelW=Math.max(90,car.w*.46);
  for(let px=x0-(camX%panelW);px<x1;px+=panelW){
    g.beginPath(); g.moveTo(px,topY+roofH); g.lineTo(px,wallB); g.stroke();
  }
  g.fillStyle="rgba(18,48,70,.26)";
  g.fillRect(Math.max(-50,x0),wallB-H*.032,Math.min(W+100,x1)-Math.max(-50,x0),H*.032);

  // roof
  const roofGrad=g.createLinearGradient(0,topY,0,topY+roofH);
  roofGrad.addColorStop(0,"#5390d9"); roofGrad.addColorStop(1,"#3a56c9");
  g.fillStyle=roofGrad;
  rr(g,x0,topY,x1-x0,roofH,20); g.fill();
  // neon strip under roof edge
  g.save();
  g.shadowColor="#4cc9f0"; g.shadowBlur=18;
  g.fillStyle=`rgba(120,220,255,${0.75+0.25*Math.sin(S.t*0.08)})`;
  rr(g,x0+10,topY+roofH-7,Math.max(0,x1-x0-20),7,4); g.fill();
  g.restore();
  g.font=`bold ${Math.max(18,H*0.038)}px "Arial Rounded MT Bold","Comic Sans MS",sans-serif`;
  g.fillStyle="#fff"; g.textAlign="center"; g.textBaseline="middle";
  const signX=Math.max(Math.min((x0+x1)/2,W-170),170);
  if(x1>0&&x0<W) g.fillText("🫧 SUDSY'S SUPER WASH 🫧",signX,topY+roofH*0.46);
  // ceiling LED fixtures and their soft floor reflections.
  for(let lx=x0+car.w*.48;lx<x1;lx+=car.w*.78){
    const pulse=.82+.12*Math.sin(S.t*.035+lx*.01);
    g.save(); g.shadowColor="#c8f2ff"; g.shadowBlur=14;
    g.fillStyle=`rgba(225,249,255,${pulse})`;
    rr(g,lx-34,topY+roofH+10,68,7,4); g.fill(); g.restore();
    const refl=g.createLinearGradient(0,wallB,0,H);
    refl.addColorStop(0,`rgba(170,230,255,${pulse*.16})`);
    refl.addColorStop(1,"rgba(170,230,255,0)");
    g.fillStyle=refl;
    g.beginPath(); g.moveTo(lx-16,wallB); g.lineTo(lx+16,wallB); g.lineTo(lx+60,H); g.lineTo(lx-60,H); g.closePath(); g.fill();
  }
  // posts
  g.fillStyle="#5390d9";
  for(let px=x0;px<=x1;px+=car.w*1.55){
    rr(g,px,topY+roofH,26,wallB-(topY+roofH),10); g.fill();
  }
  drawTrack();
  // entrance: sign + traffic light
  const ex=stations[0].x-car.w*1.05-camX;
  drawSignPost(ex,"WASH →","#06d6a0");
  drawTrafficLight(stations[0].x-car.w*0.62-camX);
  // exit flag
  drawSignPost(exitX-camX+car.w*0.4,"CLEAN!","#ffb703");
}
function drawTrack(){
  const x0=stations[0].x-car.w*0.9-camX, x1=exitX+car.w*0.3-camX;
  if(x1<0||x0>W) return;
  const ty=roadTop()+H*0.012, th=Math.max(12,H*0.02);
  g.save();
  g.beginPath(); g.rect(Math.max(0,x0),ty,Math.min(W,x1)-Math.max(0,x0),th); g.clip();
  g.fillStyle="#212529"; g.fillRect(x0,ty,x1-x0,th);
  g.fillStyle="#ffd60a";
  const sw=26, off=-(camX%(sw*2));
  for(let x=off-sw*2;x<W+sw*2;x+=sw*2){
    g.beginPath();
    g.moveTo(x,ty+th); g.lineTo(x+sw,ty); g.lineTo(x+sw*1.55,ty); g.lineTo(x+sw*0.55,ty+th);
    g.closePath(); g.fill();
  }
  g.restore();
}
function drawTrafficLight(x){
  if(x<-90||x>W+90) return;
  const py=roadTop();
  // GO! sign on top
  g.fillStyle="#2b9348";
  rr(g,x-32,py-H*0.56,64,H*0.055,10); g.fill();
  g.fillStyle="#fff";
  g.font=`bold ${Math.max(14,H*0.028)}px "Arial Rounded MT Bold","Comic Sans MS",sans-serif`;
  g.textAlign="center"; g.textBaseline="middle";
  g.fillText("GO!",x,py-H*0.532);
  // housing
  g.fillStyle="#495057"; g.fillRect(x-6,py-H*0.34,12,H*0.34);
  g.fillStyle="#212529"; rr(g,x-23,py-H*0.505,46,H*0.17,10); g.fill();
  const cy0=py-H*0.505+H*0.032, lr=Math.max(6,H*0.017);
  [["#2dd36f",true],["#ffd60a",false],["#ff5a5f",false]].forEach(([c,on],i)=>{
    g.fillStyle=on?c:"rgba(255,255,255,.14)";
    if(on){ g.save(); g.shadowColor=c; g.shadowBlur=16;
      g.beginPath(); g.arc(x,cy0+i*H*0.052,lr,0,7); g.fill(); g.restore();
    } else { g.beginPath(); g.arc(x,cy0+i*H*0.052,lr,0,7); g.fill(); }
  });
}
function drawSignPost(x,txt,col){
  if(x<-120||x>W+120) return;
  const py=roadTop();
  g.fillStyle="#6c757d"; g.fillRect(x-5,py-H*0.3,10,H*0.3);
  g.fillStyle=col;
  rr(g,x-70,py-H*0.38,140,H*0.085,14); g.fill();
  g.fillStyle="#fff"; g.font=`bold ${Math.max(16,H*0.032)}px "Arial Rounded MT Bold","Comic Sans MS",sans-serif`;
  g.textAlign="center"; g.textBaseline="middle";
  g.fillText(txt,x,py-H*0.338);
}

/* station equipment: things behind car drawn in drawStationsBack,
   things in front (curtain, brushes, jets) in drawStationsFront */
function stationActive(st){ 
  const cx=car.x+car.w/2;
  return Math.abs(cx-st.x)<car.w*0.62;
}
function drawStationsBack(){
  const topY=H*0.12+H*0.09;
  for(const st of stations){
    const sx=st.x-camX;
    if(sx<-car.w||sx>W+car.w) continue;
    if(st.key==="soak"||st.key==="rinse"){
      // arch with nozzles
      g.fillStyle="#90e0ef";
      rr(g,sx-car.w*0.34,topY,car.w*0.075,roadTop()-topY,12); g.fill();
      rr(g,sx+car.w*0.265,topY,car.w*0.075,roadTop()-topY,12); g.fill();
      g.fillStyle="#48cae4";
      rr(g,sx-car.w*0.38,topY,car.w*0.76,H*0.05,12); g.fill();
      // nozzles
      g.fillStyle="#023e8a";
      for(let i=0;i<5;i++){
        const nx=sx-car.w*0.28+i*car.w*0.14;
        rr(g,nx-5,topY+H*0.05,10,14,4); g.fill();
      }
    } else if(st.key==="foam"){
      // twin foam cannons on posts
      g.fillStyle="#ff8fab";
      rr(g,sx-car.w*0.36,topY+H*0.02,car.w*0.09,H*0.16,14); g.fill();
      g.fillStyle="#a2d2ff";
      rr(g,sx+car.w*0.27,topY+H*0.02,car.w*0.09,H*0.16,14); g.fill();
      g.fillStyle="#6c757d";
      rr(g,sx-car.w*0.33,topY+H*0.18,car.w*0.03,roadTop()-topY-H*0.18,6); g.fill();
      rr(g,sx+car.w*0.30,topY+H*0.18,car.w*0.03,roadTop()-topY-H*0.18,6); g.fill();
    } else if(st.key==="wheels"){
      // floor jet units
      g.fillStyle="#ffb703";
      rr(g,sx-car.w*0.28,roadTop()-12,car.w*0.11,16,6); g.fill();
      rr(g,sx+car.w*0.17,roadTop()-12,car.w*0.11,16,6); g.fill();
      g.fillStyle="#e09800";
      rr(g,sx-car.w*0.245,roadTop()-18,car.w*0.04,8,3); g.fill();
      rr(g,sx+car.w*0.205,roadTop()-18,car.w*0.04,8,3); g.fill();
    } else if(st.key==="wax"){
      // rainbow arch
      const grd=g.createLinearGradient(sx-car.w*0.38,0,sx+car.w*0.38,0);
      ["#ef476f","#ffd166","#06d6a0","#4cc9f0","#9b5de5"].forEach((c2,ci)=>grd.addColorStop(ci/4,c2));
      g.fillStyle=grd;
      rr(g,sx-car.w*0.34,topY,car.w*0.075,roadTop()-topY,12); g.fill();
      rr(g,sx+car.w*0.265,topY,car.w*0.075,roadTop()-topY,12); g.fill();
      rr(g,sx-car.w*0.38,topY,car.w*0.76,H*0.05,12); g.fill();
      g.save(); g.translate(sx,topY-4);
      g.fillStyle="#ffd60a"; star4(g,15); g.restore();
    } else if(st.key==="dry"){
      // big yellow blower housing on roof
      g.fillStyle="#ffb703";
      rr(g,sx-car.w*0.3,topY,car.w*0.6,H*0.11,18); g.fill();
      g.fillStyle="#e09800";
      for(let i=0;i<3;i++){
        const nx=sx-car.w*0.18+i*car.w*0.18;
        g.beginPath();
        g.moveTo(nx-16,topY+H*0.11); g.lineTo(nx+16,topY+H*0.11);
        g.lineTo(nx+8,topY+H*0.155); g.lineTo(nx-8,topY+H*0.155);
        g.closePath(); g.fill();
      }
    }
  }
}
function drawStationsFront(){
  const topY=H*0.12+H*0.09;
  for(const st of stations){
    const sx=st.x-camX;
    if(sx<-car.w||sx>W+car.w) continue;
    const act=stationActive(st);
    if(st.key==="mitter"){
      // hanging cloth strips
      const n=11, span=car.w*0.62, len=roadTop()-topY-H*0.02;
      for(let i=0;i<n;i++){
        const hx=sx-span/2+i*span/(n-1);
        const sway=Math.sin(S.t*0.13+i*0.9)*(act?16:5);
        const hue=i%2===0?"#4cc9f0":"#4895ef";
        g.strokeStyle=hue; g.lineWidth=13; g.lineCap="round";
        g.beginPath(); g.moveTo(hx,topY);
        g.quadraticCurveTo(hx+sway*0.5,topY+len*0.55,hx+sway,topY+len);
        g.stroke();
      }
      g.fillStyle="#3f37c9";
      rr(g,sx-car.w*0.36,topY-8,car.w*0.72,16,8); g.fill();
    } else if(st.key==="brush"){
      // two giant spinning rollers
      drawRoller(sx-car.w*0.22,topY+H*0.02,act);
      drawRoller(sx+car.w*0.22,topY+H*0.02,act);
    }
  }
}
function drawRoller(x,topY,act){
  const w=car.w*0.17, h=roadTop()-topY-H*0.015;
  g.save();
  // fuzzy edge bumps
  g.fillStyle="#e63946";
  const bumps=14;
  for(let i=0;i<bumps;i++){
    const by=topY+h*(i+0.5)/bumps;
    const wob=act?Math.sin(S.t*0.5+i)*4:0;
    g.beginPath(); g.arc(x-w/2+wob,by,7,0,7); g.fill();
    g.beginPath(); g.arc(x+w/2-wob,by,7,0,7); g.fill();
  }
  const gr=g.createLinearGradient(x-w/2,0,x+w/2,0);
  gr.addColorStop(0,"#c1121f"); gr.addColorStop(0.5,"#ff6b6b"); gr.addColorStop(1,"#c1121f");
  g.fillStyle=gr;
  rr(g,x-w/2,topY,w,h,w*0.4); g.fill();
  // spinning stripes
  g.save();
  rr(g,x-w/2,topY,w,h,w*0.4); g.clip();
  g.strokeStyle="rgba(255,255,255,.55)"; g.lineWidth=8;
  const off=(S.t*(act?7:1))% (h/5);
  for(let sy=topY-h/5+off; sy<topY+h+20; sy+=h/5){
    g.beginPath(); g.moveTo(x-w/2-6,sy+14); g.lineTo(x+w/2+6,sy-14); g.stroke();
  }
  g.restore();
  // axle
  g.fillStyle="#495057"; g.fillRect(x-5,topY-H*0.06,10,H*0.06);
  g.restore();
}

/* Draw a car-local layer, but per section, each at its own opacity.
   This is what makes "clean body, filthy wheels" visible.
   In manual mode the pixels themselves are the truth (she erased them),
   so we draw them straight; in auto mode the pixels are intact and the
   section value is the truth, so we fade each area independently.      */
function drawLayerBySection(layerCv,x,y,w,valueOf){
  const kind=CARS[S.carType].kind, h=w*0.52;
  for(let i=0;i<7;i++){
    const v=clamp01(valueOf(i));
    if(v<0.03) continue;
    g.save();
    clipSection(g,i,x,y,w,kind);
    g.globalAlpha=v;
    g.drawImage(layerCv,x,y,w,h);
    g.restore();
  }
  g.globalAlpha=1;
}
function drawCarFull(){
  const bounce=Math.sin(S.t*0.35)*car.bounce;
  const y=car.y+bounce;
  const sx=car.x-camX;
  const manual=(S.mode==="manual");
  // wet-ground reflection
  const gy=y+car.h*0.99;
  g.save();
  g.beginPath(); g.rect(0,gy,W,H-gy); g.clip();
  g.translate(0,2*gy); g.scale(1,-1);
  g.globalAlpha=0.14;
  drawVehicle(g,sx,y,car.w,CARS[S.carType],car.spin,shineGlow);
  g.restore();
  drawVehicle(g,sx,y,car.w,CARS[S.carType],car.spin,shineGlow);

  if(manual){
    // erased pixels ARE the state — draw the layers as they stand
    g.drawImage(dirtCv,sx,y,car.w,car.h);
    g.drawImage(soapCv,sx,y,car.w,car.h);
    g.drawImage(dropCv,sx,y,car.w,car.h);
  } else {
    drawLayerBySection(dirtCv,sx,y,car.w, i=>secs[i].dirt);
    drawLayerBySection(soapCv,sx,y,car.w, i=>secs[i].soap);
    drawLayerBySection(dropCv,sx,y,car.w, i=>secs[i].water);
    // streaky wax shows up as uneven pale patches where it bonded badly
    for(let i=0;i<7;i++){
      const k=secs[i];
      if(k.wax<0.05||k.waxQ>0.72) continue;
      g.save();
      clipSection(g,i,sx,y,car.w,CARS[S.carType].kind);
      g.globalAlpha=clamp01(k.wax*(1-k.waxQ))*0.5;
      g.fillStyle="#fff8e1";
      for(let b=0;b<5;b++){
        const bx=sx+((i*37+b*53)%100)/100*car.w;
        g.beginPath();
        g.ellipse(bx,y+car.h*(0.2+((b*29)%60)/100),car.w*0.07,car.h*0.16,0.4,0,7);
        g.fill();
      }
      g.restore();
    }
    g.globalAlpha=1;
  }
}

/* ---------- manual phase machine ---------- */
let manualReport=[0,0,0,0,0,0];
const MPHASE_KEYS=["Spray","Scrub","Rinse","Dry","Wax","Shine"];

/* how complete is the CURRENT manual phase, measured from the real state? */
function manualPhaseMetric(p){
  recomputeManualSecs();
  const avg=f=>{ let t=0,n=0; for(let s=0;s<7;s++){ t+=f(secs[s]); n++; } return t/n; };
  if(p===0) return clamp01(avg(k=>k.soft));
  if(p===1) return clamp01(1-avg(k=>k.dirt));
  if(p===2){ const soap=avg(k=>k.soap); return soap<0.02?1:clamp01(1-soap); }
  if(p===3){ const wet=avg(k=>k.water); return wet<0.02?1:clamp01(1-wet); }
  if(p===4) return clamp01(avg(k=>k.wax));
  if(p===5) return clamp01(shineTaps/5);
  return 1;
}
function setManualPhase(p){
  manualPhase=p;
  cover.fill(0);
  stripProgress(p+1);   // slot 0 is the drive-in
  if(p>=0&&p<6) msg(MPHASES[p].emo,MPHASES[p].txt);
  $("#progWrap").classList.toggle("show",p>=0&&p<6);
  setProgress(0);
  showPedal(p===6);
  $("#nextBtn").style.display=(p>=0&&p<6)?"flex":"none";
  updateCleanBadge();
  lastTouchTime=Date.now();
}
/* Advance to the next phase. Nothing is force-cleaned here — whatever she
   left behind stays behind, and shows up in the final score.            */
function advanceManual(auto){
  if(manualPhase>=0&&manualPhase<6) manualReport[manualPhase]=manualPhaseMetric(manualPhase);
  if(auto) cheer(); else blip(700,0.1,"triangle",0.12);
  spawnSparkles(car.x-camX+car.w/2,car.y+car.h/2,false,auto?12:5);

  if(manualPhase===4){
    // the wax she did apply soaks in with a golden shimmer
    spawnSparkles(car.x-camX+car.w/2,car.y+car.h/2,false,16);
  }
  if(manualPhase<5){ setManualPhase(manualPhase+1); return; }
  if(manualPhase===5){
    setManualPhase(6);
    dingDing();
    msg("🏁","Hold GAS to drive out!");
  }
}
let inspectView="side";
function finishRun(){
  if(S.celebrating) return;
  S.celebrating=true;
  setMachine(null); setEngine(false,0);
  if(S.mode==="manual"){
    if(manualPhase>=0&&manualPhase<6) manualReport[manualPhase]=manualPhaseMetric(manualPhase);
    recomputeManualSecs();
  }
  // BOTH modes are now scored the same way, from the same section state
  finalCleanPct=Math.round(scoreOverall()*100);
  const earnedStars = finalCleanPct>=95?3:(finalCleanPct>=80?2:1);
  S.stars+=earnedStars; $("#starN").textContent=S.stars;
  hideMsg();
  $("#progWrap").classList.remove("show");
  showPedal(false); showHorn(false); showCleanBadge(false);
  $("#nextBtn").style.display="none";
  $("#speedZone").classList.remove("on");
  if(finalCleanPct>=80){ spawnConfetti(); tada(); setTimeout(honk,700); }
  else { blip(330,0.25,"triangle",0.16); setTimeout(()=>blip(262,0.35,"triangle",0.14),260); }

  let cheerText="Still dirty — try a slower wash!";
  if(finalCleanPct>=95) cheerText="Sparkling clean!";
  else if(finalCleanPct>=80) cheerText="Great wash!";
  else if(finalCleanPct>=60) cheerText="Partly clean — you missed some spots!";
  $("#cheerTxt").textContent=cheerText;
  $("#finalClean").textContent="FINAL: "+finalCleanPct+"% CLEAN · "+"⭐".repeat(earnedStars);
  $("#finalClean").style.display="block";
  $("#bigBtn").textContent="Wash another! 🚗";

  buildReport();
  inspectView="side";
  document.querySelectorAll(".viewBtn").forEach(b=>b.classList.toggle("active",b.dataset.v==="side"));
  drawInspection();
  setTimeout(()=>$("#celebrate").classList.remove("hidden"),650);
}

/* ---------- station-by-station report ---------- */
function repRow(name,v){

  return `<div class="repRow"><span class="nm">${name}</span>
    <span class="bar"><span class="fill" style="width:${pct}%;background:${col}"></span></span>
    <span class="pc">${pct}%</span></div>`;
}
function buildReport(){
  let h=`<div class="repHead">Why you got ${finalCleanPct}%</div>`;
  h+=repRow("Body",scoreBody());

  h+=repRow("Rinsed",scoreRinsed());
  h+=repRow("Finish",scoreFinish());
  h+=`<div class="repHead" style="margin-top:8px">Station by station</div>`;
  if(S.mode==="auto") stations.forEach(st=>{ h+=repRow(st.lbl,st.progress); });
  else MPHASE_KEYS.forEach((k,i)=>{ h+=repRow(k,manualReport[i]); });
  $("#reportBox").innerHTML=h;
}

/* ---------- the inspection bay canvas ---------- */
function dirtTint(v){
  // brown when dirty, clean white when not
  const a=clamp01(v);
  return `rgba(${Math.round(111-20*a)},${Math.round(78-20*a)},${Math.round(55-15*a)},${a*0.85})`;
}
function drawInspection(){
  const ic=$("#inspectCv"), c=ic.getContext("2d");
  const IW=ic.width, IH=ic.height;
  c.clearRect(0,0,IW,IH);
  // bright inspection lighting
  const bg=c.createLinearGradient(0,0,0,IH);
  bg.addColorStop(0,"#ffffff"); bg.addColorStop(1,"#dcefff");
  c.fillStyle=bg; c.fillRect(0,0,IW,IH);
  c.fillStyle="rgba(120,190,240,.25)";
  for(let i=0;i<3;i++) c.fillRect(0,IH*0.78+i*9,IW,4);

  const kind=CARS[S.carType].kind;
  if(inspectView==="side"){
    const w=IW*0.82, x=(IW-w)/2, h=w*0.52, y=IH*0.5-h*0.5;
    drawVehicle(c,x,y,w,CARS[S.carType],0,clamp01(scoreFinish()));
    // residue, section by section
    for(let i=0;i<7;i++){
      const k=secs[i];
      if(k.dirt>0.04){
        c.save(); clipSection(c,i,x,y,w,kind);
        c.globalAlpha=clamp01(k.dirt); c.drawImage(dirtCv,x,y,w,h);
        c.restore();
      }
      if(k.soap>0.04){   // pale soap streaks
        c.save(); clipSection(c,i,x,y,w,kind);
        c.globalAlpha=clamp01(k.soap)*0.8; c.drawImage(soapCv,x,y,w,h);
        c.restore();
      }
      if(k.water>0.04){
        c.save(); clipSection(c,i,x,y,w,kind);
        c.globalAlpha=clamp01(k.water)*0.9; c.drawImage(dropCv,x,y,w,h);
        c.restore();
      }
    }
    c.globalAlpha=1;
    // outline the sections that are still dirty, and name them
    c.font='bold 13px "Arial Rounded MT Bold","Comic Sans MS",sans-serif';
    c.textAlign="center"; c.textBaseline="middle";
    for(let i=0;i<7;i++){
      if(secs[i].dirt<0.25) continue;
      c.save();
      c.setLineDash([7,5]);
      c.strokeStyle="#ff3b3b"; c.lineWidth=3;
      c.beginPath();
      clipSectionPath(c,i,x,y,w,kind);
      c.stroke();
      c.restore();
    }
    c.setLineDash([]);
    c.fillStyle="#1d3557";
    c.fillText("Red outline = still dirty",IW/2,IH-16);
  } else {
    drawOverhead(c,IW,IH,kind);
  }
}
/* same shapes as clipSection but strokeable */
function clipSectionPath(c,i,x,y,w,kind){
  const U=v=>v*w/100;
  const wl=WHEELS[kind]||WHEELS.car;
  c.beginPath();
  if(i===SEC.WHEEL_F){ const q=wl.f; c.arc(x+U(q[0]),y+U(q[1]),U(q[2]),0,7); }
  else if(i===SEC.WHEEL_R){ const q=wl.r; c.arc(x+U(q[0]),y+U(q[1]),U(q[2]),0,7); }
  else if(i===SEC.ROOF)    c.rect(x+U(18),y+U(1),U(64),U(11));
  else if(i===SEC.WINDOWS) c.rect(x+U(24),y+U(12),U(52),U(13));
  else if(i===SEC.HOOD)    c.rect(x+U(70),y+U(25),U(28),U(20));
  else if(i===SEC.REAR)    c.rect(x+U(3),y+U(25),U(23),U(20));
  else                     c.rect(x+U(26),y+U(25),U(44),U(20));
}
/* overhead: the view that reveals a missed roof or hood */
function drawOverhead(c,IW,IH,kind){
  const bw=IW*0.30, bh=IH*0.82, bx=(IW-bw)/2, by=(IH-bh)/2;
  const zone=(x,y,w,h,r,sec,label)=>{
    c.save();
    c.beginPath();
    if(r) c.arc(x+w/2,y+h/2,Math.min(w,h)/2,0,7);
    else { const rad=10;
      c.moveTo(x+rad,y); c.arcTo(x+w,y,x+w,y+h,rad); c.arcTo(x+w,y+h,x,y+h,rad);
      c.arcTo(x,y+h,x,y,rad); c.arcTo(x,y,x+w,y,rad); c.closePath(); }
    c.fillStyle="#e8eef5"; c.fill();
    c.fillStyle=dirtTint(secs[sec].dirt); c.fill();
    c.lineWidth=3;
    c.strokeStyle=secs[sec].dirt>0.25?"#ff3b3b":"#8fa8bf";
    if(secs[sec].dirt>0.25) c.setLineDash([6,4]);
    c.stroke(); c.setLineDash([]);
    c.fillStyle="#1d3557";
    c.font='bold 11px "Arial Rounded MT Bold","Comic Sans MS",sans-serif';
    c.textAlign="center"; c.textBaseline="middle";
    c.fillText(Math.round(secClean(sec)*100)+"%",x+w/2,y+h/2);
    c.restore();
    if(label){
      c.fillStyle="#4361ee";
      c.font='bold 11px "Arial Rounded MT Bold","Comic Sans MS",sans-serif';
      c.textAlign="left"; c.textBaseline="middle";
      c.fillText(label,x+w+10,y+h/2);
    }
  };
  const ww=bw*0.30, hh=bh*0.13;
  // wheels at the four corners
  zone(bx-ww*0.75,by+bh*0.16,ww,hh,false,SEC.WHEEL_F,null);
  zone(bx+bw-ww*0.25,by+bh*0.16,ww,hh,false,SEC.WHEEL_F,null);
  zone(bx-ww*0.75,by+bh*0.72,ww,hh,false,SEC.WHEEL_R,null);
  zone(bx+bw-ww*0.25,by+bh*0.72,ww,hh,false,SEC.WHEEL_R,null);
  // body bands, nose at the top
  zone(bx,by,               bw,bh*0.20,false,SEC.HOOD,   "Hood");
  zone(bx,by+bh*0.21,       bw,bh*0.16,false,SEC.WINDOWS,"Windshield");
  zone(bx,by+bh*0.38,       bw,bh*0.28,false,SEC.ROOF,   "Roof");
  zone(bx,by+bh*0.67,       bw,bh*0.14,false,SEC.DOORS,  "Doors");
  zone(bx,by+bh*0.82,       bw,bh*0.18,false,SEC.REAR,   "Rear");
  c.fillStyle="#1d3557";
  c.font='bold 13px "Arial Rounded MT Bold","Comic Sans MS",sans-serif';
  c.textAlign="center"; c.textBaseline="middle";
  c.fillText("Looking down from above — brown means you missed a spot",IW/2,IH-14);
}

const activePts=new Map();
const gasEl=$("#gas"), brakeEl=$("#brake"), hornEl=$("#horn");

function bindHold(el,onDown,onUp){
  const down=e=>{ e.preventDefault(); e.stopPropagation(); initAudio(); el.classList.add("pressed"); onDown(); lastTouchTime=Date.now(); hideHint(); };
  const up=e=>{ if(e){e.preventDefault(); e.stopPropagation();} el.classList.remove("pressed"); onUp&&onUp(); };
  el.addEventListener("touchstart",down,{passive:false});
  el.addEventListener("touchend",up,{passive:false});
  el.addEventListener("touchcancel",up,{passive:false});
  el.addEventListener("mousedown",down);
  el.addEventListener("mouseup",up);
  el.addEventListener("mouseleave",up);
}
bindHold(gasEl,()=>{ S.pedal=true; },()=>{ S.pedal=false; });
bindHold(brakeEl,()=>{ S.brake=true; },()=>{ S.brake=false; });
bindHold(hornEl,()=>{ honk(); },null);

function getPts(e){
  if(e.changedTouches) return [...e.changedTouches].map(t=>({id:t.identifier,x:t.clientX,y:t.clientY}));
  return [{id:e.pointerId??0,x:e.clientX,y:e.clientY}];
}
function onDown(e){
  const tgt=e.target;
  if(tgt&&tgt.closest&&tgt.closest("#gas,#brake,#horn,#homeBtn,#nextBtn,.overlay")) return;
  initAudio();
  for(const t of getPts(e)){ activePts.set(t.id,{x:t.x,y:t.y}); touchAt(t.x,t.y,true); }
  lastTouchTime=Date.now(); hideHint();
  e.preventDefault();
}
function onMove(e){
  for(const t of getPts(e)){
    if(!activePts.has(t.id)) continue;
    const prev=activePts.get(t.id);
    const dx=t.x-prev.x, dy=t.y-prev.y;
    const dist=Math.hypot(dx,dy), steps=Math.max(1,Math.floor(dist/14));
    for(let i=1;i<=steps;i++) touchAt(prev.x+dx*i/steps,prev.y+dy*i/steps,false);
    activePts.set(t.id,{x:t.x,y:t.y});
  }
  lastTouchTime=Date.now();
  e.preventDefault();
}
function onUp(e){
  for(const t of getPts(e)) activePts.delete(t.id);
  e.preventDefault();
}
if("ontouchstart" in window){
  document.addEventListener("touchstart",onDown,{passive:false});
  document.addEventListener("touchmove",onMove,{passive:false});
  document.addEventListener("touchend",onUp,{passive:false});
  document.addEventListener("touchcancel",onUp,{passive:false});
}else{
  document.addEventListener("pointerdown",onDown);
  document.addEventListener("pointermove",e=>{ if(activePts.size) onMove(e); });
  document.addEventListener("pointerup",onUp);
  document.addEventListener("pointercancel",onUp);
}
document.addEventListener("gesturestart",e=>e.preventDefault());

let scrubGate=0, squeakGate=0;
/* mark cells of a grid under the brush, and report which section was touched */
function stampGrid(arr,lx,ly,r,val){
  const gx0=Math.floor((lx-r)/LW*GW), gx1=Math.floor((lx+r)/LW*GW);
  const gy0=Math.floor((ly-r)/LH*GH), gy1=Math.floor((ly+r)/LH*GH);
  for(let gy=Math.max(0,gy0);gy<=Math.min(GH-1,gy1);gy++)
    for(let gx=Math.max(0,gx0);gx<=Math.min(GW-1,gx1);gx++){
      const i=gy*GW+gx;
      if(cellSec[i]<0) continue;
      if(arr===grid){ if(grid[i]===1) grid[i]=2; }
      else arr[i]=val;
    }
}
function secUnder(lx,ly){
  const gx=Math.floor(lx/LW*GW), gy=Math.floor(ly/LH*GH);
  if(gx<0||gx>=GW||gy<0||gy>=GH) return -1;
  return cellSec[gy*GW+gx];
}
function touchAt(x,y,isStart){
  if(S.celebrating) return;
  if(S.scene==="auto"){
    if(isStart){ spawnBubbles(x,y,false,2); bubblePop(); }
    return;
  }
  if(S.scene!=="mwash") return;
  const sx=car.x-camX;
  const pad=car.w*0.09, R=car.w*0.075;
  const onCar = x>sx-pad&&x<sx+car.w+pad&&y>car.y-pad&&y<car.y+car.h+pad;
  const lx=(x-sx)/car.w*LW, ly=(y-car.y)/car.h*LH, LR=R/car.w*LW;
  if(!onCar){
    if(manualPhase===0||manualPhase===2) spawnSpray(x,y,false);
    return;
  }
  const si=secUnder(lx,ly);
  const k=si>=0?secs[si]:null;

  if(manualPhase===0){          // SPRAY — wets and softens; does not really clean
    spawnSpray(x,y,false);
    if(k){ k.soft=clamp01(k.soft+0.05); }
    paintDropLocal(lx,ly,LR*1.2);
    stampGrid(gWater,lx,ly,LR*1.3,1);
    eraseLocal(dc,lx,ly,LR*0.35);
  }
  else if(manualPhase===1){     // SCRUB — soft, soapy dirt lifts fast; dry grit doesn't
    const soft=k?k.soft:0.3, grit=k?k.grit:0;
    const power=(0.42+0.58*soft)*(1-0.35*grit);
    eraseLocal(dc,lx,ly,LR*power);
    paintSoapLocal(lx,ly,LR*0.9); soapDirty=true;
    stampGrid(gSoap,lx,ly,LR*0.9,1);
    if(power>0.6) stampGrid(grid,lx,ly,LR*power,2);
    else stampGrid(grid,lx,ly,LR*power*0.8,2);
    spawnBubbles(x,y,false,2);
    if(Date.now()-scrubGate>140){ bubblePop(); scrubGate=Date.now(); }
  }
  else if(manualPhase===2){     // RINSE — strips soap, carries off loose dirt, leaves it wet
    spawnSpray(x,y,false);
    eraseLocal(sc,lx,ly,LR*1.4);
    stampGrid(gSoap,lx,ly,LR*1.4,0);
    if(k&&k.soft>0.5) eraseLocal(dc,lx,ly,LR*0.5);
    if(k&&k.soft>0.5) stampGrid(grid,lx,ly,LR*0.4,2);
    paintDropLocal(lx,ly,LR*1.2);
    stampGrid(gWater,lx,ly,LR*1.2,1);
  }
  else if(manualPhase===3){     // DRY — removes water only
    eraseLocal(pc,lx,ly,LR*1.4);
    stampGrid(gWater,lx,ly,LR*1.4,0);
    if(Date.now()-squeakGate>260){ squeak(); squeakGate=Date.now(); }
  }
  else if(manualPhase===4){     // WAX — bonds badly to a surface that is still dirty or soapy
    if(k){
      const quality=clamp01((1-k.dirt)*(1-k.soap)*(1-k.water*0.4));
      const prev=waxQAt[si]||1, wprev=k.wax;
      waxQAt[si]=(prev*wprev+quality*0.08)/(wprev+0.08);
    }
    paintWaxLocal(lx,ly,LR*0.9); soapDirty=true;
    stampGrid(gWax,lx,ly,LR*0.9,1);
    if(Date.now()-scrubGate>170){ blip(880+Math.random()*300,0.08,"sine",0.09); scrubGate=Date.now(); }
    if(Math.random()<0.5) spawnSparkles(x,y,false,1);
  }
  else if(manualPhase===5){     // SHINE
    if(isStart){
      shineTaps++;
      spawnSparkles(x,y,false,10);
      blip(1200+shineTaps*150,0.12,"triangle",0.15);
    }
  }

  if(manualPhase>=0&&manualPhase<6){
    const f=manualPhaseMetric(manualPhase);
    setProgress(f);
    syncManualVisuals();
    updateCleanBadge();
    if(f>=0.93) advanceManual(true);
  }
}
/* manual overlays are drawn from pixels, but shine still needs a value */
function syncManualVisuals(){
  let wx=0,n=0;
  BODY_SECS.forEach((s,i)=>{ wx+=BODY_W[i]*secs[s].wax*secs[s].waxQ; n+=BODY_W[i]; });
  shineGlow=clamp01(wx/n*0.6 + (manualPhase>=5?shineTaps/5*0.4:0));
}
